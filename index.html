  <!DOCTYPE html>
  <html lang="pt-BR">
  <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lombada — diário de leituras com tradutor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500;1,9..144,600&family=Spectral:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
  /* Direção A — Estante de papel */
  :root{
    --paper:#ECE4D4;
    --paper-2:#E3DAC6;
    --paper-3:#D6CBB3;
    --ink:#1A1714;
    --ink-2:#3A322A;
    --dim:#6F6655;
    --gold:#A8842F;
    --gold-2:#C9A24B;
    --rule:rgba(26,23,20,.18);
    --shadow: 6px 8px 0 rgba(26,23,20,.12), 1px 2px 0 rgba(26,23,20,.25);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink);font-family:"Spectral",Georgia,serif;font-size:16px;line-height:1.45;-webkit-font-smoothing:antialiased}
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
    background-image:
      radial-gradient(rgba(26,23,20,.06) 1px, transparent 1px),
      radial-gradient(rgba(168,132,47,.05) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    mix-blend-mode:multiply;opacity:.7;
  }
  a{color:inherit;text-decoration:none}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
  input,textarea,select{font:inherit;color:inherit}

  .app{position:relative;z-index:2;max-width:520px;margin:0 auto;min-height:100vh;padding:18px 16px 96px}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 18px;border-bottom:1px solid var(--rule);margin-bottom:18px}
  .wordmark{font-family:"Fraunces",serif;font-style:italic;font-weight:600;font-size:22px;letter-spacing:.01em}
  .wordmark .dot{color:var(--gold)}
  .crumb{font-family:"Space Mono",monospace;font-size:10px;text-transform:lowercase;letter-spacing:.12em;color:var(--dim)}
  .back{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:lowercase;color:var(--ink-2);border-bottom:1px solid var(--rule);padding-bottom:2px}

  .tabs{position:fixed;left:0;right:0;bottom:0;z-index:10;background:var(--paper);border-top:1px solid var(--rule)}
  .tabs-inner{max-width:520px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
  .tab{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);text-align:center;padding:8px 0}
  .tab.active{color:var(--ink)}
  .tab.active span{border-bottom:1.5px solid var(--gold);padding-bottom:3px}

  .h-display{font-family:"Fraunces",serif;font-style:italic;font-weight:400;font-size:34px;line-height:1.05;letter-spacing:-.01em;color:var(--ink)}
  .h-display .q{color:var(--gold)}
  .h-section{font-family:"Fraunces",serif;font-style:italic;font-weight:400;font-size:22px;line-height:1.1}
  .label{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}
  .meta{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.04em;color:var(--ink-2)}

  .home-hero{padding:24px 4px 28px}
  .home-hero .kicker{margin-bottom:14px}
  .home-hero h1{margin-bottom:22px}
  .search{display:flex;gap:8px;border:1px solid var(--ink);background:var(--paper-2);padding:2px}
  .search input{flex:1;background:transparent;border:0;padding:14px 12px;font-family:"Spectral",serif;font-size:16px;outline:none}
  .search input::placeholder{color:var(--dim);font-style:italic}
  .search button{background:var(--ink);color:var(--paper);padding:0 18px;font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase}
  .suggest{margin-top:28px}
  .suggest .label{margin-bottom:10px}
  .suggest ul{list-style:none;display:flex;flex-wrap:wrap;gap:6px}
  .suggest li{border:1px solid var(--rule);padding:7px 10px;font-size:13px;font-style:italic;color:var(--ink-2);background:var(--paper-2);cursor:pointer}

  .wall{display:grid;grid-template-columns:repeat(2,1fr);gap:18px 14px;margin-top:8px}
  @media(min-width:420px){.wall{grid-template-columns:repeat(3,1fr);gap:20px 12px}}
  .book{display:block;text-align:left;cursor:pointer}
  .cover{position:relative;aspect-ratio:2/3;background:var(--paper-3);box-shadow:var(--shadow);overflow:hidden}
  .cover img{width:100%;height:100%;object-fit:cover;display:block}
  .cover .pt{position:absolute;left:6px;top:6px;font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.18em;background:var(--paper);color:var(--ink);padding:3px 5px;border:1px solid var(--ink)}
  .cover .stars-overlay{position:absolute;left:6px;bottom:6px;font-family:"Space Mono",monospace;font-size:11px;color:var(--paper);background:rgba(26,23,20,.78);padding:3px 6px;letter-spacing:.05em}
  .cover.fallback{display:flex;align-items:flex-end;padding:14px 12px}
  .cover.fallback .ft{font-family:"Fraunces",serif;font-style:italic;font-size:20px;line-height:1.05;color:rgba(26,23,20,.78)}
  .cover.fallback::after{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:rgba(26,23,20,.18)}
  .book .t{margin-top:8px;font-family:"Fraunces",serif;font-style:italic;font-size:15px;line-height:1.15}
  .book .a{font-size:12px;color:var(--dim);margin-top:2px}
  .book .e{font-family:"Space Mono",monospace;font-size:10px;color:var(--ink-2);margin-top:4px;letter-spacing:.04em}
  .book .e em{font-style:normal;color:var(--gold);border-bottom:1px solid var(--gold)}

  .work-head{display:flex;gap:14px;padding:6px 0 18px;border-bottom:1px solid var(--rule);margin-bottom:14px}
  .work-head .cover{width:96px;flex:0 0 96px}
  .work-head .wmeta h2{font-family:"Fraunces",serif;font-style:italic;font-size:24px;line-height:1.05}
  .work-head .wmeta .a{margin-top:4px;color:var(--ink-2)}
  .work-head .wmeta .y{margin-top:8px}
  .editions{list-style:none;display:flex;flex-direction:column}
  .edition{padding:16px 2px;border-bottom:1px solid var(--rule);display:grid;grid-template-columns:1fr auto;gap:10px}
  .edition .pub{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink)}
  .edition .te{font-family:"Fraunces",serif;font-style:italic;font-size:17px;margin-top:4px}
  .edition .tr{margin-top:6px;font-size:14px}
  .edition .tr b{font-weight:500;color:var(--gold);border-bottom:1px solid var(--gold);padding-bottom:1px}
  .edition .tr.empty{color:var(--dim);font-style:italic}
  .edition .row{margin-top:6px;display:flex;gap:10px;flex-wrap:wrap}
  .edition .row span{font-family:"Space Mono",monospace;font-size:10px;color:var(--dim);letter-spacing:.04em}
  .edition .pick{align-self:end;border:1px solid var(--ink);padding:8px 10px;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;background:var(--paper-2)}
  .edition .pick:hover{background:var(--ink);color:var(--paper)}

  .form{display:flex;flex-direction:column;gap:18px;margin-top:10px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field input,.field textarea,.field select{
    background:var(--paper-2);border:1px solid var(--rule);padding:12px;outline:none;font-family:"Spectral",serif;font-size:15px;
  }
  .field input:focus,.field textarea:focus{border-color:var(--ink)}
  .field textarea{min-height:120px;resize:vertical;line-height:1.5}
  .field.translator{padding:14px;background:var(--paper-2);border:1px solid var(--ink);position:relative}
  .field.translator::before{content:"o diferencial";position:absolute;right:10px;top:-8px;background:var(--gold);color:var(--paper);font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;padding:2px 6px}
  .field.translator input{background:var(--paper);border:0;border-bottom:1.5px solid var(--gold);padding:8px 2px;font-family:"Fraunces",serif;font-style:italic;font-size:20px}
  .field.translator input:focus{border-color:var(--ink)}
  .field .hint{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.03em;color:var(--dim);line-height:1.5}
  .field .hint.gold{color:var(--gold)}
  .stars{display:flex;align-items:center;gap:2px;font-family:"Fraunces",serif;font-size:34px;color:var(--gold);line-height:1;user-select:none;letter-spacing:2px}
  .stars .s{position:relative;width:.7em;display:inline-block;color:rgba(168,132,47,.25);cursor:pointer}
  .stars .s .fill{position:absolute;left:0;top:0;overflow:hidden;color:var(--gold);width:100%}
  .stars-val{font-family:"Space Mono",monospace;font-size:11px;color:var(--dim);margin-left:8px;letter-spacing:.08em;cursor:pointer}
  .status{display:flex;gap:6px;flex-wrap:wrap}
  .status button{border:1px solid var(--rule);padding:8px 12px;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;background:var(--paper-2)}
  .status button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .row2{display:flex;gap:10px}
  .row2>*{flex:1}
  .submit{margin-top:6px;background:var(--ink);color:var(--paper);padding:16px;font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;width:100%}

  .shelf-foot{margin-top:8px;font-size:13px;line-height:1.35}
  .shelf-foot .tt{font-family:"Fraunces",serif;font-style:italic;font-size:15px}
  .shelf-foot .tr{color:var(--gold);font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.06em;margin-top:3px}
  .shelf-foot .ed{color:var(--dim);font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.04em;margin-top:2px}

  .empty{padding:40px 10px;text-align:center;color:var(--dim);font-style:italic}
  .loading{padding:24px 10px;color:var(--dim);font-style:italic}

  /* modal card */
  .modal{position:fixed;inset:0;background:rgba(26,23,20,.72);display:none;z-index:50;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:18px}
  .modal.open{display:flex}
  #cardCanvas{width:min(320px,80vw);height:auto;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .card-actions{display:flex;gap:8px}
  .card-actions button{border:1px solid var(--paper);padding:11px 15px;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;background:transparent;color:var(--paper)}
  .card-actions button.solid{background:var(--gold-2);color:var(--ink);border-color:var(--gold-2)}

  </style>
  </head>
  <body>
  <div class="app">
    <div class="topbar">
      <div class="wordmark">LOMBADA<span class="dot">.</span></div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="crumb" id="crumb">estante</div>
        <div class="crumb" id="meuhandle"></div>
      </div>
    </div>

    <!-- BUSCA -->
    <section id="view-busca">
      <div class="home-hero">
        <div class="label kicker">um diário de leituras · com tradutor</div>
        <h1 class="h-display">o que você<br>está lendo<span class="q">?</span></h1>
        <div class="search">
          <input id="q" type="text" placeholder="Busque por título, autor ou ISBN" autocomplete="off"
            onkeydown="if(event.key==='Enter')buscar()" />
          <button onclick="buscar()">buscar</button>
        </div>
        <div class="suggest">
          <div class="label">tente</div>
          <ul>
            <li onclick="sugerir('Crime e Castigo')">Crime e Castigo</li>
            <li onclick="sugerir('A Montanha Mágica')">A Montanha Mágica</li>
            <li onclick="sugerir('Ulisses')">Ulisses</li>
            <li onclick="sugerir('Orlando')">Orlando</li>
          </ul>
        </div>
      </div>
      <div id="resultados"></div>
    </section>

    <!-- EDIÇÕES + FORM -->
    <section id="view-edicoes" style="display:none">
      <div style="margin-bottom:14px"><button class="back" onclick="voltarBusca()">← voltar</button></div>
      <div id="edicoes"></div>
      <div id="form"></div>
    </section>

    <!-- PRATELEIRA -->
    <section id="view-prateleira" style="display:none">
      <div class="label kicker" style="margin-bottom:4px">sua estante</div>
      <div class="h-section" id="shelf-count" style="margin-bottom:16px">—</div>
      <div id="prateleira"></div>
    </section>
  </div>

  <nav class="tabs">
    <div class="tabs-inner">
      <button class="tab active" id="tab-busca" onclick="irPara('busca')"><span>buscar</span></button>
      <button class="tab" id="tab-prateleira" onclick="irPara('prateleira')"><span>prateleira</span></button>
      <button class="tab" id="tab-card" onclick="irPara('prateleira')"><span>card</span></button>
    </div>
  </nav>

  <div class="modal" id="modal" onclick="if(event.target===this)fecharCard()">
    <canvas id="cardCanvas" width="1080" height="1920"></canvas>
    <div class="card-actions">
      <button class="solid" onclick="compartilharCard()">compartilhar</button>
      <button onclick="baixarCard()">baixar</button>
      <button onclick="fecharCard()">fechar</button>
    </div>
  </div>

  <script>
  const $ = (id)=>document.getElementById(id);
  let escolha=null, edicaoSel=null, notaSel=0, statusSel='Lido', eds=[], docs=[], prateleira=[], cardAtual=null, meuHandle='';

  function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  function hueFromTitle(t){let h=0;for(let i=0;i<(t||'?').length;i++)h=(h*31+t.charCodeAt(i))%360;return h;}

  /* navegação entre as 3 seções (mesma página, sem rotas) */
  function irPara(v){
    $('view-busca').style.display = v==='busca'?'block':'none';
    $('view-edicoes').style.display = 'none';
    $('view-prateleira').style.display = v==='prateleira'?'block':'none';
    $('tab-busca').classList.toggle('active', v==='busca');
    $('tab-prateleira').classList.toggle('active', v==='prateleira');
    $('crumb').textContent = v==='prateleira'?'prateleira':'estante';
    if(v==='prateleira') carregarPrateleira();
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function voltarBusca(){
    $('view-edicoes').style.display='none';
    $('view-busca').style.display='block';
    $('crumb').textContent='estante';
  }
  function sugerir(t){ $('q').value=t; buscar(); }

  /* capa: real OU fallback tipográfico; trata capa quebrada e capa "vazia" (1px) da OL */
  function coverHTML(titulo,capa,extra){
    if(capa){
      return `<div class="cover">
        <img src="${capa}" alt="" loading="lazy"
          onerror="this.closest('.cover').className='cover fallback';this.closest('.cover').innerHTML='<div class=\\'ft\\'>${esc(titulo).replace(/'/g,"&#39;")}</div>'+(this.dataset.extra||'')"
          data-extra="${(extra||'').replace(/"/g,'&quot;')}">
        ${extra||''}</div>`;
    }
    return `<div class="cover fallback"><div class="ft">${esc(titulo)}</div>${extra||''}</div>`;
  }

  async function buscar(){
    const q=$('q').value.trim(); if(q.length<2)return;
    $('resultados').innerHTML='<div class="loading">buscando…</div>';
    let r; try{ r=await fetch('/api/buscar?q='+encodeURIComponent(q)); }catch(e){
      $('resultados').innerHTML='<div class="empty">sem conexão. tenta de novo.</div>'; return; }
    docs=await r.json();
    const isbnBusca = docs.some(d=>d.isbn_match);
    if(!docs.length){
      const pareceIsbn = /^[-\s0-9Xx]+$/.test(q) && q.replace(/[^0-9Xx]/g,'').length>=10;
      $('resultados').innerHTML='<div class="empty">'+(pareceIsbn?'Não encontrei esse ISBN. Tente buscar pelo título ou autor.':'nada encontrado pra "'+esc(q)+'".')+'</div>';return;
    }
    $('resultados').innerHTML='<div class="label" style="margin:24px 0 4px">'+(isbnBusca?'Edição encontrada por ISBN':'resultados')+'</div><div class="wall">'+
      docs.map((d,i)=>`<div class="book" onclick="verEdicoes(${i})">
        ${coverHTML(d.titulo, d.capa_url, d.tem_pt?'<span class="pt">PT</span>':'')}
        ${d.isbn_match?'<div class="label" style="margin-top:10px">Edição encontrada por ISBN</div>':''}
        <div class="t">${esc(d.titulo)}</div>
        <div class="a">${esc(d.autor)}${d.ano?' · '+d.ano:''}</div>
      </div>`).join('')+'</div>';
  }

  async function verEdicoes(i){
    escolha=docs[i];
    irPara('busca');
    $('view-busca').style.display='none';
    $('view-edicoes').style.display='block';
    $('crumb').textContent='edição';
    $('form').innerHTML='';
    $('edicoes').innerHTML='<div class="loading">carregando edições…</div>';
    window.scrollTo({top:0,behavior:'smooth'});
    if(escolha.isbn_match && escolha.edicao_isbn){
      eds=[escolha.edicao_isbn];
    }else{
      let r; try{ r=await fetch('/api/edicoes?work_key='+encodeURIComponent(escolha.work_key)); }catch(e){
        $('edicoes').innerHTML='<div class="empty">não consegui carregar as edições.</div>'; return; }
      eds=await r.json();
    }
    const head=`<div class="work-head">
        <div style="width:96px;flex:0 0 96px">${coverHTML(escolha.titulo, escolha.capa_url, escolha.tem_pt?'<span class="pt">PT</span>':'')}</div>
        <div class="wmeta">
          <div class="label">obra</div>
          <h2>${esc(escolha.titulo)}</h2>
          <div class="a">${esc(escolha.autor)}</div>
          <div class="y meta">${escolha.ano?'orig. '+escolha.ano:''}${eds.length?' · '+eds.length+' edições':''}</div>
        </div>
      </div>`;
    if(!eds.length){$('edicoes').innerHTML=head+'<div class="empty">sem edições listadas pra essa obra.</div>';return;}
    $('edicoes').innerHTML=head+
      '<div class="label" style="margin:4px 0 10px">'+(escolha.isbn_match?'Edição encontrada por ISBN':'edições brasileiras')+'</div>'+
      '<ul class="editions">'+eds.map((e,j)=>{
        const titPt = e.titulo_edicao ? `<div class="te">${esc(e.titulo_edicao)}</div>`:'';
        const trad = e.tradutor
          ? `<div class="tr">trad. <b>${esc(e.tradutor)}</b></div>`
          : `<div class="tr empty">tradutor não informado</div>`;
        const linha=[e.ano,e.idioma,e.isbn?'ISBN '+e.isbn:''].filter(Boolean)
          .map(x=>`<span>${esc(String(x))}</span>`).join('');
        return `<li class="edition">
          <div>
            <div class="pub">${esc(e.editora||'editora não informada')}</div>
            ${titPt}
            ${trad}
            <div class="row">${linha}</div>
          </div>
          <button class="pick" onclick="escolherEdicao(${j})">escolher</button>
        </li>`;
      }).join('')+'</ul>';
  }

  function escolherEdicao(j){
    edicaoSel=eds[j]; notaSel=0; statusSel='Lido';
    const titulo = (edicaoSel.titulo_edicao && edicaoSel.idioma==='Português') ? edicaoSel.titulo_edicao : escolha.titulo;
    $('form').innerHTML=`
      <div class="label" style="margin:26px 0 10px">registrar leitura</div>
      <div class="form">
        <div>
          <div class="h-section">${esc(titulo)}</div>
          <div class="meta" style="margin-top:4px">${esc(edicaoSel.editora||'')}${edicaoSel.ano?' · '+edicaoSel.ano:''}</div>
        </div>

        <div class="field translator">
          <label class="label">tradutor(a)</label>
          <input id="f_trad" value="${esc(edicaoSel.tradutor)}" placeholder="ex: Lia Wyler">
          <div class="hint ${edicaoSel.tradutor?'':'gold'}">${edicaoSel.tradutor
            ? 'veio das fontes — confere se tá certo.'
            : 'não veio das fontes. preenche aqui — é o que nenhum outro app guarda.'}</div>
        </div>

        <div class="field">
          <label class="label">sua nota</label>
          <div class="stars" id="stars"></div>
        </div>

        <div class="row2">
          <div class="field"><label class="label">status</label>
            <div class="status" id="status-pick">
              <button type="button" class="on" onclick="setStatus('Lido',this)">Lido</button>
              <button type="button" onclick="setStatus('Lendo',this)">Lendo</button>
              <button type="button" onclick="setStatus('Quero ler',this)">Quero ler</button>
            </div></div>
        </div>
        <div class="field"><label class="label">quando</label>
          <input id="f_data" placeholder="ex: jun 2026"></div>

        <div class="field"><label class="label">relato (vira a legenda do card)</label>
          <textarea id="f_relato" maxlength="140" placeholder="o que ficou de você nessa leitura…"></textarea></div>

        <button class="submit" onclick="salvar()">salvar na prateleira</button>
      </div>`;
    renderStars();
    $('form').scrollIntoView({behavior:'smooth',block:'start'});
  }

  function setStatus(s,btn){
    statusSel=s;
    [...$('status-pick').children].forEach(b=>b.classList.toggle('on', b===btn));
  }

  /* estrelas com meia-estrela: toca na metade esquerda = .5, direita = inteira */
  function renderStars(){
    const w=$('stars'); w.innerHTML='';
    for(let n=1;n<=5;n++){
      const s=document.createElement('span');
      s.className='s';
      const fillPct = notaSel>=n ? 100 : (notaSel>=n-0.5 ? 50 : 0);
      s.innerHTML='★<span class="fill" style="width:'+fillPct+'%">★</span>';
      s.onclick=(ev)=>{
        const rect=s.getBoundingClientRect();
        const left=(ev.clientX-rect.left) < rect.width/2;
        notaSel = left ? n-0.5 : n;
        renderStars();
      };
      w.appendChild(s);
    }
    const v=document.createElement('span');
    v.className='stars-val';
    v.textContent = notaSel? notaSel.toLocaleString('pt-BR') : 'sem nota';
    v.onclick=()=>{ notaSel=0; renderStars(); };
    w.appendChild(v);
  }

  async function salvar(){
    const body={
      work_key:escolha.work_key,
      titulo:(edicaoSel.titulo_edicao && edicaoSel.idioma==='Português') ? edicaoSel.titulo_edicao : escolha.titulo,
      autor:escolha.autor,
      idioma_original:escolha.idioma_original, ano_obra:escolha.ano,
      ol_edition_key:edicaoSel.ol_edition_key, editora:edicaoSel.editora,
      tradutor:$('f_trad').value.trim(), isbn:edicaoSel.isbn, idioma:edicaoSel.idioma,
      ano_edicao:edicaoSel.ano, capa_url:edicaoSel.capa_url,
      status:statusSel, nota:notaSel||null, relato:$('f_relato').value.trim(),
      data:$('f_data').value.trim()
    };
    let r; try{ r=await fetch('/api/prateleira',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); }
    catch(e){ alert('não consegui salvar. tenta de novo.'); return; }
    $('q').value='';$('resultados').innerHTML='';$('edicoes').innerHTML='';$('form').innerHTML='';
    irPara('prateleira');
  }

  function estrelasTxt(n){n=n||0;let o='';for(let i=1;i<=5;i++)o+= i<=n?'★':(i-0.5===n?'⯪':'☆');return o;}
  async function carregarPrateleira(){
    let r; try{ r=await fetch('/api/prateleira'); }catch(e){ return; }
    prateleira=await r.json();
    $('shelf-count').textContent = prateleira.length
      ? prateleira.length+(prateleira.length===1?' livro':' livros') : '—';
    if(!prateleira.length){$('prateleira').innerHTML='<div class="empty">vazia ainda. busca um livro pra começar.</div>';return;}
    $('prateleira').innerHTML='<div class="wall">'+prateleira.map((l,i)=>`
      <div class="book" onclick="abrirCard(${i})">
        ${coverHTML(l.titulo, l.capa_url, l.nota?`<span class="stars-overlay">${estrelasTxt(l.nota)} ${l.nota.toLocaleString('pt-BR')}</span>`:'')}
        <div class="shelf-foot">
          <div class="tt">${esc(l.titulo)}</div>
          ${l.tradutor?`<div class="tr">trad. ${esc(l.tradutor)}</div>`:''}
          ${l.editora?`<div class="ed">${esc(l.editora)}${l.ano?' · '+l.ano:''}</div>`:''}
        </div>
      </div>`).join('')+'</div>';
  }

  /* ---------- card de compartilhar (canvas 1080x1920) — fundo bone, Direção A ---------- */
  const C_PAPER='#ECE4D4', C_PAPER2='#E3DAC6', C_INK='#1A1714', C_INK2='#3A322A', C_DIM='#6F6655', C_GOLD='#A8842F';
  function wrap(ctx,t,maxW,maxL){const ws=(t||'').split(' ');const ls=[];let c='';
    for(const w of ws){const test=c?c+' '+w:w;if(ctx.measureText(test).width>maxW&&c){ls.push(c);c=w;if(ls.length===maxL-1)break;}else c=test;}
    if(c)ls.push(c);return ls.slice(0,maxL);}
  function starPath(ctx,cx,cy,r,fill){const p=new Path2D();let rot=-Math.PI/2;const st=Math.PI/5;
    p.moveTo(cx+Math.cos(rot)*r,cy+Math.sin(rot)*r);
    for(let i=0;i<5;i++){rot+=st;p.lineTo(cx+Math.cos(rot)*r*.42,cy+Math.sin(rot)*r*.42);rot+=st;p.lineTo(cx+Math.cos(rot)*r,cy+Math.sin(rot)*r);}
    p.closePath();ctx.save();ctx.strokeStyle=C_GOLD;ctx.lineWidth=3;ctx.stroke(p);
    if(fill>0){if(fill<1){ctx.clip(p);ctx.fillStyle=C_GOLD;ctx.fillRect(cx-r,cy-r,r,r*2);}else{ctx.fillStyle=C_GOLD;ctx.fill(p);}}ctx.restore();}

  function drawCard(l){
    const cv=$('cardCanvas'),ctx=cv.getContext('2d'),W=1080,H=1920;
    ctx.fillStyle=C_PAPER;ctx.fillRect(0,0,W,H);
    // moldura fina interna (igual ao ::before do card CSS)
    ctx.strokeStyle='rgba(26,23,20,.18)';ctx.lineWidth=2;ctx.strokeRect(40,40,W-80,H-80);

    const cw=560, ch=840, cx=(W-cw)/2, cy=150;
    const drawText=()=>{
      let y=cy+ch+96;ctx.textAlign='center';
      // título italic Fraunces
      ctx.fillStyle=C_INK;ctx.font="italic 600 76px 'Fraunces',serif";
      const tl=wrap(ctx,l.titulo,W-180,2);tl.forEach((ln,i)=>ctx.fillText(ln,W/2,y+i*82));
      y+=(tl.length-1)*82+70;
      // autor
      ctx.fillStyle=C_INK2;ctx.font="400 38px 'Spectral',serif";ctx.fillText(l.autor||'',W/2,y);
      // estrelas
      y+=96;const r=30,gap=78,total=5*gap,sx=(W-total)/2+r;
      for(let i=0;i<5;i++){const v=Math.max(0,Math.min(1,(l.nota||0)-i));starPath(ctx,sx+i*gap,y,r,v<0.5?0:v<1?0.5:1);}
      if(l.nota){ctx.fillStyle=C_DIM;ctx.font="400 30px 'Space Mono',monospace";ctx.fillText(l.nota.toLocaleString('pt-BR'),W/2,y+78);}
      // relato
      if(l.relato){y+=140;ctx.fillStyle=C_INK;ctx.font="italic 400 40px 'Spectral',serif";
        const rl=wrap(ctx,'“'+l.relato+'”',W-260,3);rl.forEach((ln,i)=>ctx.fillText(ln,W/2,y+i*54));}
      // colofão + wordmark no rodapé
      const yc=H-150;ctx.strokeStyle='rgba(26,23,20,.25)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(120,yc-44);ctx.lineTo(W-120,yc-44);ctx.stroke();
      ctx.fillStyle=C_INK2;ctx.font="400 26px 'Space Mono',monospace";
      const col=[l.tradutor?'TRAD. '+l.tradutor.toUpperCase():null,(l.editora||'').toUpperCase()||null,l.ano||null].filter(Boolean).join('   ·   ');
      ctx.fillText(col,W/2,yc);
      ctx.fillStyle=C_INK;ctx.font="italic 600 40px 'Fraunces',serif";
      ctx.fillText('lombada',W/2,yc+64);
      // pingo dourado no fim do wordmark
      const wmW=ctx.measureText('lombada').width;ctx.fillStyle=C_GOLD;ctx.fillText('.',W/2+wmW/2+6,yc+64);
      if(meuHandle){ctx.fillStyle=C_INK2;ctx.font="400 24px 'Space Mono',monospace";ctx.fillText('@'+meuHandle,W/2,yc+110);}
      ctx.textAlign='left';
    };

    // capa: real OU fallback tipográfico, com sombra dura
    ctx.fillStyle='rgba(26,23,20,.18)';ctx.fillRect(cx+14,cy+18,cw,ch); // sombra dura
    const fbCover=()=>{
      const h=hueFromTitle(l.titulo);
      ctx.fillStyle=C_PAPER2;ctx.fillRect(cx,cy,cw,ch);
      ctx.fillStyle='rgba(26,23,20,.18)';ctx.fillRect(cx,cy,8,ch); // faixa da lombada
      ctx.fillStyle='rgba(26,23,20,.78)';ctx.textAlign='left';ctx.font="italic 600 58px 'Fraunces',serif";
      const fl=wrap(ctx,l.titulo,cw-90,5);
      fl.forEach((ln,i)=>ctx.fillText(ln,cx+45,cy+ch-90-(fl.length-1-i)*64));
      ctx.textAlign='center';drawText();
    };
    if(l.capa_url){
      const im=new Image();im.crossOrigin='anonymous';
      im.onload=()=>{ if(im.naturalWidth<5){fbCover();return;}
        const ir=im.width/im.height,wr=cw/ch;let dw,dh,dx,dy;
        if(ir>wr){dh=ch;dw=ch*ir;dx=cx-(dw-cw)/2;dy=cy;}else{dw=cw;dh=cw/ir;dx=cx;dy=cy-(dh-ch)/2;}
        ctx.save();ctx.beginPath();ctx.rect(cx,cy,cw,ch);ctx.clip();ctx.drawImage(im,dx,dy,dw,dh);ctx.restore();
        drawText();
      };
      im.onerror=fbCover;
      im.src='/api/capa?url='+encodeURIComponent(l.capa_url);
    } else { fbCover(); }
  }
  async function abrirCard(i){
    const l=prateleira[i];
    cardAtual=l;
    $('modal').classList.add('open');
    try{ await document.fonts.ready; }catch(e){}
    drawCard(l);
  }
  function fecharCard(){$('modal').classList.remove('open');}
  function baixarCard(){
    try{
      const url=$('cardCanvas').toDataURL('image/png');
      const a=document.createElement('a');a.href=url;a.download='lombada-card.png';a.click();
    }catch(e){
      alert('não consegui baixar o card. tenta o botão "compartilhar".');
    }
  }
  function baixarBlob(blob){
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='lombada-card.png';a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
  }
  /* compartilhamento nativo: no celular abre a bandeja (Stories, WhatsApp…) com a imagem.
     sem suporte (desktop) → cai pro download. */
  async function compartilharCard(){
    const cv=$('cardCanvas');
    let blob;
    try{
      blob = await new Promise((res,rej)=>{ cv.toBlob(b=> b?res(b):rej(new Error('sem blob')),'image/png'); });
    }catch(e){
      alert('não consegui gerar a imagem do card. abre o card de novo e tenta.');
      return;
    }
    const file=new File([blob],'lombada-card.png',{type:'image/png'});
    const l=cardAtual||{};
    const texto = l.titulo ? ('“'+l.titulo+'”'+(l.autor?' — '+l.autor:'')) : 'minha leitura na Lombada';
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], text:texto}); return; }
      catch(e){ if(e && e.name==='AbortError') return; }
    }
    baixarBlob(blob);
  }

  /* ---------- identidade anônima (handle fofo, sem login) ---------- */
  async function init(){
    try{
      const r=await fetch('/api/eu');
      if(r.ok){ const u=await r.json(); meuHandle=u.handle||''; if(meuHandle)$('meuhandle').textContent='@'+meuHandle; }
    }catch(e){}
    carregarPrateleira();
  }
  init();
  </script>
  </body>
