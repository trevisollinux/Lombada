<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lombada — diário de leituras</title>
<meta name="description" content="Registre o que leu, com qual edição e tradução. Tipo Letterboxd, mas pra livros." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500;1,9..144,600&family=Spectral:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#ECE4D4; --paper-2:#E3DAC6; --paper-3:#D6CBB3;
  --ink:#1A1714; --ink-2:#3A322A; --dim:#6F6655;
  --gold:#A8842F; --gold-2:#C9A24B;
  --danger:#7a2e22;
  --rule:rgba(26,23,20,.18);
  --shadow: 6px 8px 0 rgba(26,23,20,.12), 1px 2px 0 rgba(26,23,20,.25);
  --shadow-sm: 3px 4px 0 rgba(26,23,20,.10), 1px 1px 0 rgba(26,23,20,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:"Spectral",Georgia,serif;font-size:16px;line-height:1.45;-webkit-font-smoothing:antialiased}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image:radial-gradient(rgba(26,23,20,.06) 1px,transparent 1px),radial-gradient(rgba(168,132,47,.05) 1px,transparent 1px);
  background-size:3px 3px,7px 7px;background-position:0 0,1px 2px;mix-blend-mode:multiply;opacity:.7;
}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
input,textarea,select{font:inherit;color:inherit}
@media (prefers-reduced-motion: reduce){*{scroll-behavior:auto!important;transition:none!important}}

.app{position:relative;z-index:2;max-width:560px;margin:0 auto;min-height:100vh;padding:16px 16px 92px}

/* ---------- header ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 16px;border-bottom:1px solid var(--rule);margin-bottom:20px}
.brand{display:flex;align-items:center;gap:11px}
.seal{width:42px;height:42px;border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center;
  font-family:"Fraunces",serif;font-style:italic;font-weight:600;font-size:24px;box-shadow:var(--shadow-sm);background:var(--paper-2)}
.wordmark{font-family:"Fraunces",serif;font-style:italic;font-weight:600;font-size:23px;letter-spacing:.01em}
.wordmark .dot{color:var(--gold)}
.crumb{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.12em;color:var(--dim);text-align:right;opacity:0;transition:opacity .3s}
.crumb.visible{opacity:1}
.crumb b{display:block;color:var(--ink-2);font-weight:400;font-size:11px}

/* ---------- bottom nav (4) ---------- */
.tabs{position:fixed;left:0;right:0;bottom:0;z-index:10;background:var(--paper);border-top:1px solid var(--rule)}
.tabs-inner{max-width:560px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);padding:9px 0 calc(9px + env(safe-area-inset-bottom))}
.tab{display:flex;flex-direction:column;align-items:center;gap:5px;font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);padding:4px 0}
.tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5}
.tab.active{color:var(--ink)}
.tab.active span{border-bottom:1.5px solid var(--gold);padding-bottom:2px}

/* ---------- type ---------- */
.h-display{font-family:"Fraunces",serif;font-style:italic;font-weight:400;font-size:38px;line-height:1.02;letter-spacing:-.015em}
.h-display .q{color:var(--gold)}
.h-section{font-family:"Fraunces",serif;font-style:italic;font-weight:400;font-size:22px;line-height:1.1}
.label{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}
.meta{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.04em;color:var(--ink-2)}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin:30px 0 14px}
.section-head .more{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);border-bottom:1px solid var(--gold);padding-bottom:1px}

/* ---------- home / busca ---------- */
.hero{padding:14px 2px 4px}
.hero .label{margin-bottom:14px}
.hero h1{margin-bottom:20px}
.search{display:flex;align-items:center;gap:0;border:1.5px solid var(--ink);background:var(--paper-2);box-shadow:var(--shadow-sm)}
.search .ic{padding:0 4px 0 14px;color:var(--dim);display:flex;align-items:center}
.search .ic svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
.search input{flex:1;background:transparent;border:0;padding:15px 12px;font-family:"Spectral",serif;font-size:16px;font-style:italic;outline:none}
.search input::placeholder{color:var(--dim);font-style:italic}
.search button{background:var(--ink);color:var(--paper);padding:0 18px;align-self:stretch;font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase}

.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.chip{border:1px solid var(--rule);padding:7px 11px;font-size:13px;font-style:italic;color:var(--ink-2);background:var(--paper-2);cursor:pointer;transition:background .15s,color .15s}
.chip:hover,.chip:active{background:var(--ink);color:var(--paper)}

/* ---------- poster wall ---------- */
.wall{display:grid;grid-template-columns:repeat(2,1fr);gap:20px 14px;margin-top:6px}
@media(min-width:440px){.wall{grid-template-columns:repeat(3,1fr)}}
.book{display:block;text-align:left;cursor:pointer;width:100%}
.cover{position:relative;aspect-ratio:2/3;background:var(--paper-3);box-shadow:var(--shadow);overflow:hidden;transition:transform .15s}
.book:active .cover{transform:translate(1px,1px)}
.cover img{width:100%;height:100%;object-fit:cover;display:block}
.cover .pt{position:absolute;right:6px;top:6px;font-family:"Space Mono",monospace;font-size:8.5px;letter-spacing:.14em;background:var(--paper);color:var(--ink);padding:3px 5px;border:1px solid var(--ink)}
.cover .stars-overlay{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:space-between;
  font-family:"Space Mono",monospace;font-size:11px;color:var(--paper);background:linear-gradient(transparent,rgba(26,23,20,.85) 75%);padding:22px 8px 6px;letter-spacing:.04em}
.cover.fallback{display:flex;align-items:flex-end;padding:14px 12px}
.cover.fallback .ft{font-family:"Fraunces",serif;font-style:italic;font-size:21px;line-height:1.04;color:rgba(26,23,20,.78)}
.cover.fallback::after{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:rgba(26,23,20,.18)}
.book .t{margin-top:9px;font-family:"Fraunces",serif;font-style:italic;font-size:15px;line-height:1.15}
.book .a{font-size:12px;color:var(--dim);margin-top:2px}
.book .e{font-family:"Space Mono",monospace;font-size:10px;color:var(--gold);margin-top:5px;letter-spacing:.04em;border-bottom:1px solid rgba(168,132,47,.35);display:inline-block;padding-bottom:1px}
.book .yr{font-family:"Space Mono",monospace;font-size:10px;color:var(--dim);margin-top:4px;letter-spacing:.06em}
.book .yr .br{color:var(--ink-2)}

/* "lendo agora" — faixa horizontal */
.rail{display:flex;gap:14px;overflow-x:auto;padding:2px 2px 8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.rail::-webkit-scrollbar{display:none}
.rail .book{flex:0 0 132px;scroll-snap-align:start}
@media(min-width:440px){.rail .book{flex:0 0 150px}}

/* ---------- edições ---------- */
.work-head{display:flex;gap:14px;padding:4px 0 16px;border-bottom:1px solid var(--rule);margin-bottom:8px}
.work-head .cover{width:92px;flex:0 0 92px}
.work-head .wmeta{padding-top:2px}
.work-head .wmeta h2{font-family:"Fraunces",serif;font-style:italic;font-size:23px;line-height:1.05;margin-top:4px}
.work-head .wmeta .a{margin-top:4px;color:var(--ink-2);font-size:14px}
.work-head .wmeta .y{margin-top:8px}
.editions{list-style:none;display:flex;flex-direction:column}
.edition{padding:16px 2px;border-bottom:1px solid var(--rule);cursor:pointer;transition:background .12s}
.edition:active{background:var(--paper-2)}
.edition .pub{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink)}
.edition .te{font-family:"Fraunces",serif;font-style:italic;font-size:17px;margin-top:4px}
.edition .tr{margin-top:6px;font-size:14px}
.edition .tr b{font-weight:500;color:var(--gold);border-bottom:1px solid var(--gold);padding-bottom:1px}
.edition .tr .none{color:var(--dim);font-style:italic;border:0}
.edition .ln{margin-top:6px}

/* ---------- registrar ---------- */
.card-form{margin-top:8px;border:1px solid var(--rule);background:var(--paper-2);padding:16px}
.field{margin-bottom:16px}
.field label{display:block;margin-bottom:6px}
.field input[type=text],.field textarea,.field select{width:100%;background:var(--paper);border:1px solid var(--rule);padding:12px;font-family:"Spectral",serif;font-size:15px;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold)}
.field textarea{resize:vertical;min-height:74px}
.stars{display:flex;gap:8px;align-items:center}
.stars .st{font-size:30px;line-height:1;color:var(--gold);cursor:pointer;opacity:.28}
.stars .st.on{opacity:1}
.stars .stxt{font-family:"Space Mono",monospace;font-size:11px;color:var(--dim);margin-left:6px}
.row{display:flex;gap:12px}
.row>*{flex:1}
.btn-primary{width:100%;background:var(--ink);color:var(--paper);padding:14px;font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;margin-top:4px}

/* ---------- estante / diário / perfil ---------- */
.screen-head{display:flex;align-items:center;justify-content:space-between;margin:4px 0 4px}
.screen-head .btn-share{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--ink);padding:8px 11px}

/* diário — linha do tempo */
.diary{list-style:none;display:flex;flex-direction:column;margin-top:8px}
.diary li{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--rule);cursor:pointer}
.diary .dcover{width:54px;flex:0 0 54px;aspect-ratio:2/3;box-shadow:var(--shadow-sm);overflow:hidden;background:var(--paper-3)}
.diary .dcover img{width:100%;height:100%;object-fit:cover}
.diary .dcover.fallback{display:flex;align-items:flex-end;padding:5px}
.diary .dcover.fallback .ft{font-family:"Fraunces",serif;font-style:italic;font-size:10px;line-height:1.02;color:rgba(26,23,20,.7)}
.diary .dbody{flex:1;min-width:0}
.diary .dtop{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.diary .dt{font-family:"Fraunces",serif;font-style:italic;font-size:16px;line-height:1.15}
.diary .dwhen{font-family:"Space Mono",monospace;font-size:10px;color:var(--dim);white-space:nowrap;letter-spacing:.04em}
.diary .dstars{font-family:"Space Mono",monospace;font-size:12px;color:var(--gold);margin-top:3px;letter-spacing:.05em}
.diary .dtr{font-family:"Space Mono",monospace;font-size:10px;color:var(--gold);margin-top:3px}
.diary .drelato{font-size:13px;color:var(--ink-2);margin-top:6px;font-style:italic;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* perfil */
.profile{margin-top:10px}
.profile .pcard{border:1px solid var(--rule);background:var(--paper-2);padding:20px;text-align:center}
.profile .phandle{font-family:"Fraunces",serif;font-style:italic;font-size:26px;margin-top:6px}
.profile .pcount{font-family:"Space Mono",monospace;font-size:11px;color:var(--ink-2);letter-spacing:.06em;margin-top:6px}
.profile .pactions{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.profile .pbtn{padding:13px;font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;border:1px solid var(--ink)}
.profile .pbtn.solid{background:var(--ink);color:var(--paper)}
.profile .plink{font-family:"Space Mono",monospace;font-size:11px;color:var(--dim);margin-top:14px;word-break:break-all}

/* ---------- empty states ---------- */
.empty{padding:30px 4px;color:var(--dim);font-style:italic}
.empty-rich{padding:44px 4px 32px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.empty-rich .ei{font-size:38px;opacity:.35;line-height:1}
.empty-rich p{color:var(--dim);font-style:italic;font-size:15px;line-height:1.5}
.empty-rich .btn-cta{display:inline-block;background:var(--ink);color:var(--paper);padding:13px 22px;font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;margin-top:2px}

/* ---------- modal card ---------- */
.modal{position:fixed;inset:0;z-index:50;background:rgba(26,23,20,.72);display:none;align-items:flex-start;justify-content:center;padding:24px 14px;overflow-y:auto}
.modal.open{display:flex}
.modal-card{width:100%;max-width:380px;display:flex;flex-direction:column;gap:12px}
#cardCanvas{width:100%;height:auto;background:var(--paper);box-shadow:0 24px 60px rgba(0,0,0,.5)}
.modal-actions{display:flex;flex-direction:column;gap:8px}
.modal-actions .btn-share-card{width:100%;background:var(--ink);color:var(--paper);padding:14px;font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;text-align:center}
.modal-actions .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-actions .btn-secondary{background:var(--paper-2);color:var(--ink-2);padding:12px;font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--rule);text-align:center}
.modal-actions .btn-close{background:transparent;color:var(--dim);padding:10px;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;text-align:center}
.modal-actions .btn-danger{background:transparent;color:var(--danger);padding:10px;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;text-align:center;border:1px solid rgba(122,46,34,.25)}
.edit-panel{background:var(--paper);padding:16px}
.edit-panel h3{font-family:"Fraunces",serif;font-style:italic;font-weight:500;font-size:18px;margin-bottom:14px}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="seal">L</div>
      <div class="wordmark">Lombada<span class="dot">.</span></div>
    </div>
    <div class="crumb" id="crumb">estante<b id="meuhandle"></b></div>
  </header>

  <!-- ABA BUSCAR -->
  <section id="secBuscar">
    <div class="hero">
      <div class="label">um diário de leituras · com tradutor</div>
      <h1 class="h-display">o que você<br>está lendo<span class="q">?</span></h1>
      <div class="search">
        <span class="ic"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input id="q" type="text" placeholder="título, autor ou ISBN…" autocomplete="off"
          onkeydown="if(event.key==='Enter')buscar()" oninput="onQInput()" />
        <button onclick="buscar()">buscar</button>
      </div>
    </div>

    <!-- conteúdo da home (some quando há busca) -->
    <div id="homeFeed">
      <div id="lendoAgora"></div>
      <div class="section-head"><div class="label">explore · obras populares</div></div>
      <div class="chips" id="chips"></div>
    </div>

    <!-- resultados de busca -->
    <div id="resultados"></div>
    <div id="edicoes"></div>
    <div id="form"></div>
  </section>

  <!-- ABA ESTANTE -->
  <section id="secEstante" style="display:none">
    <div class="screen-head">
      <h2 class="h-section">sua estante</h2>
      <button class="btn-share" onclick="compartilharEstante()">compartilhar</button>
    </div>
    <div id="prateleira"></div>
  </section>

  <!-- ABA DIÁRIO -->
  <section id="secDiario" style="display:none">
    <div class="screen-head">
      <h2 class="h-section">seu diário</h2>
    </div>
    <div id="diario"></div>
  </section>

  <!-- ABA PERFIL -->
  <section id="secPerfil" style="display:none">
    <div id="perfil" class="profile"></div>
  </section>
</div>

<!-- TABS -->
<nav class="tabs">
  <div class="tabs-inner">
    <button class="tab active" id="tabBuscar" onclick="irPara('buscar')">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>buscar</span></button>
    <button class="tab" id="tabEstante" onclick="irPara('estante')">
      <svg viewBox="0 0 24 24"><path d="M4 19V5a2 2 0 0 1 2-2h2v18H6a2 2 0 0 1-2-2z"/><path d="M10 3h2v18h-2z"/><path d="m15 4 4 1-3 15-4-1z"/></svg>
      <span>estante</span></button>
    <button class="tab" id="tabDiario" onclick="irPara('diario')">
      <svg viewBox="0 0 24 24"><path d="M4 4h13a2 2 0 0 1 2 2v14H6a2 2 0 0 1-2-2z"/><line x1="8" y1="8" x2="15" y2="8"/><line x1="8" y1="12" x2="15" y2="12"/></svg>
      <span>diário</span></button>
    <button class="tab" id="tabPerfil" onclick="irPara('perfil')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      <span>perfil</span></button>
  </div>
</nav>

<!-- MODAL CARD -->
<div class="modal" id="modal" onclick="if(event.target===this)fecharModal()">
  <div class="modal-card">
    <canvas id="cardCanvas" width="1080" height="1920"></canvas>
    <div class="modal-actions">
      <button class="btn-share-card" onclick="compartilharCard()">compartilhar card</button>
      <div class="btn-row">
        <button class="btn-secondary" onclick="abrirEditar()">editar</button>
        <button class="btn-close" onclick="fecharModal()">fechar</button>
      </div>
      <button class="btn-danger" onclick="removerLeitura()">remover da estante</button>
    </div>
    <div id="editPanel" class="edit-panel" style="display:none"></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const esc = s => (s||'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const capaProxy = u => u ? '/api/capa?url='+encodeURIComponent(u) : '';

const SUGESTOES = ['Crime e Castigo','A Montanha Mágica','Ulisses','Orlando','O Aleph','O Morro dos Ventos Uivantes'];

let meuHandle='', escolha=null, edicaoSel=null, notaSel=0;
let resultadosArr=[], edicoesAtual=[], prateleira=[], cardAtual=null, notaEdit=0;

function estrelasStr(n){n=n||0;let o='';for(let i=1;i<=5;i++)o+=(i<=n?'★':(i-0.5===n?'⯪':'☆'));return o;}
function hue(t){let h=0;for(let i=0;i<(t||'?').length;i++)h=(h*31+t.charCodeAt(i))%360;return h;}

function coverHTML(titulo,autor,capa,extra){
  const h=hue(titulo);
  if(capa){
    return `<div class="cover">
      <img src="${esc(capa)}" alt="" loading="lazy"
        onerror="this.parentElement.classList.add('fallback');this.parentElement.innerHTML='<div class=ft>'+this.alt+'</div>';this.parentElement.style.background='hsl(${h},22%,72%)'">
      ${extra||''}</div>`;
  }
  return `<div class="cover fallback" style="background:hsl(${h},22%,72%)"><div class="ft">${esc(titulo)}</div>${extra||''}</div>`;
}

/* navegação entre abas */
function irPara(aba){
  const secs={buscar:'#secBuscar',estante:'#secEstante',diario:'#secDiario',perfil:'#secPerfil'};
  for(const k in secs) $(secs[k]).style.display = (k===aba)?'':'none';
  $('#tabBuscar').classList.toggle('active',aba==='buscar');
  $('#tabEstante').classList.toggle('active',aba==='estante');
  $('#tabDiario').classList.toggle('active',aba==='diario');
  $('#tabPerfil').classList.toggle('active',aba==='perfil');
  if(aba==='estante') carregarPrateleira();
  if(aba==='diario') renderDiario();
  if(aba==='perfil') renderPerfil();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* mostra/esconde feed da home conforme há busca */
function onQInput(){
  const v=$('#q').value.trim();
  if(!v){ limparBusca(); $('#homeFeed').style.display=''; }
}
function limparBusca(){ $('#resultados').innerHTML='';$('#edicoes').innerHTML='';$('#form').innerHTML=''; }

/* feed da home */
function renderChips(){
  $('#chips').innerHTML = SUGESTOES.map(s=>`<button class="chip" onclick="buscarTermo('${esc(s).replace(/'/g,"\\'")}')">${esc(s)}</button>`).join('');
}
function renderLendoAgora(){
  const lendo = prateleira.filter(l=>l.status==='Lendo');
  const box=$('#lendoAgora');
  if(!lendo.length){ box.innerHTML=''; return; }
  box.innerHTML=`<div class="section-head"><div class="label">lendo agora</div><span class="more" onclick="irPara('estante')">ver estante →</span></div>
    <div class="rail">`+lendo.map((l,i)=>{
      const idx=prateleira.indexOf(l);
      const ov=l.nota?`<span class="stars-overlay"><span>${estrelasStr(l.nota)}</span><span>${l.nota.toLocaleString('pt-BR')}</span></span>`:'';
      return `<div class="book" onclick="abrirCard(${idx})">${coverHTML(l.titulo,l.autor,l.capa_url,ov)}
        <div class="t">${esc(l.titulo)}</div><div class="a">${esc(l.autor)}</div></div>`;
    }).join('')+`</div>`;
}

/* busca */
function buscarTermo(t){$('#q').value=t;buscar();}
async function buscar(){
  const q=$('#q').value.trim(); if(q.length<2)return;
  $('#homeFeed').style.display='none';
  $('#edicoes').innerHTML=''; $('#form').innerHTML='';
  $('#resultados').innerHTML='<div class="empty">buscando…</div>';
  let docs;
  try{ docs=await (await fetch('/api/buscar?q='+encodeURIComponent(q))).json(); }
  catch(e){ $('#resultados').innerHTML='<div class="empty">sem conexão. tenta de novo.</div>'; return; }
  resultadosArr=docs||[];
  if(!resultadosArr.length){$('#resultados').innerHTML='<div class="empty">nada encontrado pra "'+esc(q)+'".</div>';return;}
  $('#resultados').innerHTML='<div class="section-head"><h2 class="h-section">resultados</h2></div><div class="wall">'+
    resultadosArr.map((d,i)=>`<div class="book" onclick="verEdicoes(${i})">
      ${coverHTML(d.titulo,d.autor,d.capa_url,d.tem_pt?'<span class="pt">PT</span>':'')}
      <div class="t">${esc(d.titulo)}</div>
      <div class="a">${esc(d.autor)}</div>
      <div class="yr">${d.ano||''}${d.tem_pt?' · <span class="br">ed. BR</span>':''}</div></div>`).join('')+'</div>';
}

/* edições */
async function verEdicoes(i){
  escolha=resultadosArr[i];
  $('#form').innerHTML='';
  if(escolha.isbn_match && escolha.edicao_isbn){
    edicoesAtual=[escolha.edicao_isbn];
    renderEdicoes(); return;
  }
  $('#edicoes').innerHTML='<div class="empty">carregando edições…</div>';
  $('#edicoes').scrollIntoView({behavior:'smooth',block:'start'});
  let eds;
  try{ eds=await (await fetch('/api/edicoes?work_key='+encodeURIComponent(escolha.work_key))).json(); }
  catch(e){ $('#edicoes').innerHTML='<div class="empty">não consegui carregar as edições.</div>'; return; }
  edicoesAtual=eds||[]; renderEdicoes();
}
function renderEdicoes(){
  if(!edicoesAtual.length){$('#edicoes').innerHTML='<div class="empty">sem edições listadas.</div>';return;}
  const cab=`<div class="work-head">${coverHTML(escolha.titulo,escolha.autor,escolha.capa_url,'')}
    <div class="wmeta"><div class="label">obra</div><h2>${esc(escolha.titulo)}</h2>
      <div class="a">${esc(escolha.autor)}</div>
      <div class="meta y">${[escolha.ano?'orig. '+escolha.ano:'',edicoesAtual.length+' edições'].filter(Boolean).join(' · ')}</div>
    </div></div>`;
  $('#edicoes').innerHTML=cab+'<div class="label" style="margin-bottom:6px">escolha sua edição</div><ul class="editions">'+
    edicoesAtual.map((e,j)=>{
      const pt=e.idioma==='Português';
      const tr=e.tradutor?`trad. <b>${esc(e.tradutor)}</b>`:`<span class="none">tradutor não informado</span>`;
      return `<li class="edition" onclick="escolherEdicao(${j})">
        <div class="pub">${esc(e.editora||'editora não informada')}${pt?' · PT':''}</div>
        <div class="te">${esc(e.titulo_edicao||escolha.titulo)}</div>
        <div class="tr">${tr}</div>
        <div class="ln meta">${[e.ano,e.idioma,e.isbn].filter(Boolean).map(esc).join('  ·  ')}</div>
      </li>`;
    }).join('')+'</ul>';
  $('#edicoes').scrollIntoView({behavior:'smooth',block:'start'});
}

/* registrar */
function escolherEdicao(j){
  edicaoSel=edicoesAtual[j]; notaSel=0;
  const titulo=edicaoSel.titulo_edicao||escolha.titulo;
  $('#edicoes').innerHTML='';
  $('#form').innerHTML=`
    <div class="section-head"><h2 class="h-section">registrar leitura</h2></div>
    <div class="card-form">
      <div style="font-family:'Fraunces',serif;font-style:italic;font-size:19px">${esc(titulo)}</div>
      <div class="meta" style="margin:4px 0 16px">${[edicaoSel.editora,edicaoSel.ano].filter(Boolean).map(esc).join(' · ')}</div>
      <div class="field"><label class="label">tradutor(a)</label>
        <input type="text" id="f_trad" value="${esc(edicaoSel.tradutor)}" placeholder="quem traduziu" /></div>
      <div class="field"><label class="label">sua nota</label><div class="stars" id="f_stars"></div></div>
      <div class="row">
        <div class="field"><label class="label">status</label>
          <select id="f_status"><option>Lido</option><option>Lendo</option><option>Quero ler</option></select></div>
        <div class="field"><label class="label">quando</label>
          <input type="text" id="f_data" placeholder="ex: jun 2026" /></div>
      </div>
      <div class="field"><label class="label">relato</label>
        <textarea id="f_relato" maxlength="160" placeholder="o que ficou dessa leitura…"></textarea></div>
      <button class="btn-primary" onclick="salvar()">salvar na estante</button>
    </div>`;
  montarStars('f_stars',()=>notaSel,v=>notaSel=v);

}

function montarStars(id,get,set){
  const w=$('#'+id);
  function paint(){
    const n=get(); w.innerHTML='';
    for(let i=1;i<=5;i++){
      const s=document.createElement('span');
      s.className='st'+(i<=n?' on':''); s.textContent='★';
      s.style.opacity=(i<=n?1:(i-0.5===n?.6:.28));
      s.onclick=()=>{ set(get()===i?i-0.5:i); paint(); };
      w.appendChild(s);
    }
    const t=document.createElement('span');
    t.className='stxt'; t.textContent=n?n.toLocaleString('pt-BR')+'★':'sem nota';
    w.appendChild(t);
  }
  paint();
}

async function salvar(){
  const body={
    work_key:escolha.work_key, titulo:escolha.titulo, autor:escolha.autor||'',
    idioma_original:escolha.idioma_original||'', ano_obra:escolha.ano||null,
    ol_edition_key:edicaoSel.ol_edition_key||null, editora:edicaoSel.editora||'',
    tradutor:$('#f_trad').value.trim(), isbn:edicaoSel.isbn||'', idioma:edicaoSel.idioma||'',
    ano_edicao:edicaoSel.ano||null, capa_url:edicaoSel.capa_url||'',
    status:$('#f_status').value, nota:notaSel||null,
    relato:$('#f_relato').value.trim(), data:$('#f_data').value.trim()
  };
  try{ await fetch('/api/prateleira',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); }
  catch(e){ alert('não consegui salvar. tenta de novo.'); return; }
  limparBusca(); $('#q').value=''; $('#homeFeed').style.display='';
  await carregarPrateleira();
  irPara('estante');
}

      <div class="t">${esc(l.titulo)}</div>

/* ---------- card / modal ---------- */
async function abrirCard(i){

function fecharModal(){ $('#modal').classList.remove('open'); }

function starPath(cx,cy,r){const p=new Path2D();let rot=-Math.PI/2;const st=Math.PI/5;
  p.moveTo(cx+Math.cos(rot)*r,cy+Math.sin(rot)*r);
  for(let i=0;i<5;i++){rot+=st;p.lineTo(cx+Math.cos(rot)*r*.42,cy+Math.sin(rot)*r*.42);rot+=st;p.lineTo(cx+Math.cos(rot)*r,cy+Math.sin(rot)*r);}
  p.closePath();return p;}
function drawStars(ctx,x,y,nota,r,gap,color){
  for(let i=0;i<5;i++){const cx=x+r+i*(2*r+gap);const f=Math.max(0,Math.min(1,(nota||0)-i));const p=starPath(cx,y,r);
    ctx.save();ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke(p);
    if(f>0){if(f<1){ctx.clip(p);ctx.fillStyle=color;ctx.fillRect(cx-r,y-r,r*2*f,r*2);}else{ctx.fillStyle=color;ctx.fill(p);}}ctx.restore();}
}
function wrapLeft(ctx,text,x,y,maxW,lh,maxL){
  const words=(text||'').split(' ');let line='';const lines=[];
  for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;if(lines.length===maxL-1)break;}else line=t;}
  if(line)lines.push(line);const out=lines.slice(0,maxL);
  out.forEach((ln,i)=>ctx.fillText(ln,x,y+i*lh));return y+(out.length-1)*lh;
}
function wrapCenter(ctx,text,cx,cy,maxW,lh,maxL){
  const words=(text||'').split(' ');let line='';const lines=[];
  for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;}
  if(line)lines.push(line);const out=lines.slice(0,maxL);
  const y0=cy-(out.length-1)*lh/2;out.forEach((ln,i)=>ctx.fillText(ln,cx,y0+i*lh));
}

function drawCard(l){
  const cv=$('#cardCanvas'),ctx=cv.getContext('2d'),W=1080,H=1920;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#ECE4D4';ctx.fillRect(0,0,W,H);
  const cx=110,cy=120,cw=W-220,ch=1120;
  const txt=()=>{
    let y=cy+ch+118;ctx.textAlign='left';
    ctx.fillStyle='#3A322A';ctx.font="500 italic 80px Fraunces, serif";
    y=wrapLeft(ctx,l.titulo||'',110,y,W-220,88,2);
    y+=68;ctx.fillStyle='#6F6655';ctx.font="italic 46px Spectral, serif";
    ctx.fillText(l.autor||'',110,y);
    y+=86;drawStars(ctx,110,y,l.nota||0,44,20,'#A8842F');
    if(l.relato){y+=110;ctx.fillStyle='#3A322A';ctx.font="italic 44px Spectral, serif";
      y=wrapLeft(ctx,'"'+l.relato+'"',110,y,W-220,56,3);}
    const yc=H-160;ctx.strokeStyle='rgba(26,23,20,.25)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(110,yc-46);ctx.lineTo(W-110,yc-46);ctx.stroke();
    ctx.fillStyle='#6F6655';ctx.font="400 28px 'Space Mono', monospace";
    const col=[l.tradutor?'trad. '+l.tradutor:null,l.editora||null,l.ano||null].filter(Boolean).join('   ·   ');
    ctx.fillText(col,110,yc);
    ctx.fillText('@'+(meuHandle||''),110,yc+44);
    ctx.fillStyle='#A8842F';ctx.font="600 italic 40px Fraunces, serif";
    ctx.fillText('lombada.',110,yc+98);
  };
  const fb=()=>{
    const h=hue(l.titulo);
    ctx.fillStyle='rgba(26,23,20,.18)';ctx.fillRect(cx+16,cy+20,cw,ch);
    ctx.fillStyle=`hsl(${h},22%,70%)`;ctx.fillRect(cx,cy,cw,ch);
    ctx.fillStyle='rgba(26,23,20,.72)';ctx.textAlign='center';ctx.font="600 italic 92px Fraunces, serif";
    wrapCenter(ctx,l.titulo||'',cx+cw/2,cy+ch/2,cw-150,108,4);
    ctx.textAlign='left';txt();
  };
  if(l.capa_url){
    const im=new Image();im.crossOrigin='anonymous';
    im.onload=()=>{ if(im.naturalWidth<5){fb();return;}
      ctx.fillStyle='rgba(26,23,20,.20)';ctx.fillRect(cx+16,cy+20,cw,ch);
      ctx.save();ctx.beginPath();ctx.rect(cx,cy,cw,ch);ctx.clip();
      const ir=im.width/im.height,wr=cw/ch;let dw,dh,dx,dy;
      if(ir>wr){dh=ch;dw=ch*ir;dx=cx-(dw-cw)/2;dy=cy;}else{dw=cw;dh=cw/ir;dx=cx;dy=cy-(dh-ch)/2;}
      ctx.drawImage(im,dx,dy,dw,dh);ctx.restore();
      ctx.strokeStyle='rgba(26,23,20,.25)';ctx.lineWidth=2;ctx.strokeRect(cx,cy,cw,ch);
      txt();
    };
    im.onerror=fb;
    im.src=capaProxy(l.capa_url);
  } else { fb(); }
}

async function compartilharCard(){
  const cv=$('#cardCanvas');
  cv.toBlob(async blob=>{
    if(!blob){alert('não consegui gerar o card.');return;}
    const file=new File([blob],'lombada.png',{type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file],text:'minha leitura na Lombada'}); return; }catch(e){}
    }
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lombada.png';a.click();
  },'image/png');
}

async function salvarEdicao(){
  const body={ status:$('#e_status').value, nota:notaEdit||null,
    relato:$('#e_relato').value.trim(), data:$('#e_data').value.trim() };
  try{ await fetch('/api/prateleira/'+cardAtual.leitura_id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); }

async function removerLeitura(){

  try{ await fetch('/api/prateleira/'+cardAtual.leitura_id,{method:'DELETE'}); }

}
