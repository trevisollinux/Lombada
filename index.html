<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title data-i18n="app_title">Lombada — diário de leituras</title>
<meta name="description" content="Registre o que leu, com qual edição e tradução. Tipo Letterboxd, mas pra livros." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500;1,9..144,600&family=Spectral:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1A1714" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Lombada" />
<link rel="apple-touch-icon" href="/static/icons/icon.svg" />
<link rel="stylesheet" href="/static/app.css?v=20260702c" />
</head>
<body class="theme-dark" data-theme="dark">
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="seal">L</div>
      <div class="wordmark">Lombada<span class="dot">.</span></div>
      <div class="lang-switch compact" aria-label="Idioma" data-i18n-aria-label="language">
        <button type="button" data-locale="pt-BR" aria-pressed="true" onclick="mudarIdioma('pt-BR')">PT</button>
        <button type="button" data-locale="en" aria-pressed="false" onclick="mudarIdioma('en')">EN</button>
        <button type="button" data-locale="es" aria-pressed="false" onclick="mudarIdioma('es')">ES</button>
      </div>
    </div>
    <div class="top-actions"><div class="crumb" id="crumb"><span data-i18n="crumb_reading_diary">diário de leitura</span><b id="meuhandle"></b></div></div>
  </header>

  <!-- ABA BUSCAR -->
  <section id="secBuscar">
    <!-- busca persistente (fica em todas as telas da aba) -->
    <form class="search" id="searchForm" onsubmit="buscar(event)">
      <span class="ic"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input id="q" type="search" placeholder="título, autor ou ISBN…" data-i18n-placeholder="search_placeholder" autocomplete="off" oninput="onQInput()" onfocus="onQFocus()" onblur="onQBlur()" />
      <button type="submit" aria-label="Buscar livros" data-i18n-aria-label="search_books" data-i18n="search_button">buscar</button>
    </form>

    <!-- sugestões: buscas recentes + mais buscadas (estilo autocomplete) -->
    <div id="searchSuggest" class="search-suggest" hidden></div>

    <!-- TELA: home (some quando há busca) -->
    <div id="homeFeed">
      <div class="hero-extra">
        <div class="label" data-i18n="home_label">um diário de leituras</div>
        <h1 class="h-display" data-i18n="home_title_html">o que você<br>está lendo<span class="q">?</span></h1>
      </div>
      <div id="lendoAgora"></div>
      <div class="section-head"><div class="label" data-i18n="popular_works_label">explore · obras populares</div></div>
      <div class="wall wall-mini" id="populares"></div>
    </div>

    <!-- TELA: resultados de busca -->
    <div id="resultados" style="display:none"></div>
    <!-- TELA: edições da obra -->
    <div id="edicoes" style="display:none"></div>
    <!-- TELA: registrar leitura -->
    <div id="form" style="display:none"></div>
    <!-- TELA: cadastro manual -->
    <div id="manual" style="display:none"></div>
  </section>

  <!-- ABA FEED -->
  <section id="secFeed" style="display:none">
    <div class="screen-head">
      <div><h2 class="h-section" data-i18n="feed">Feed</h2></div>
    </div>
    <div id="feed" class="feed-list"></div>
  </section>

  <!-- ABA ESTANTE -->
  <section id="secEstante" style="display:none">
    <div class="screen-head shelf-head">
      <div>
        <h2 class="h-section" data-i18n="shelf_title">Estante</h2>
        <div class="shelf-segment" role="tablist" aria-label="Estante ou diário" data-i18n-aria-label="shelf_view">
          <button id="subtabShelf" class="shelf-segment-btn active" type="button" role="tab" onclick="irPara('estante',{subaba:'shelf'})" data-i18n="shelf">Estante</button>
          <button id="subtabDiario" class="shelf-segment-btn" type="button" role="tab" onclick="irPara('estante',{subaba:'diario'})" data-i18n="diary">Diário</button>
        </div>
      </div>
      <button id="shelfShareButton" class="btn-share" onclick="compartilharEstante()" data-i18n="share">compartilhar</button>
    </div>
    <div id="prateleira"></div>
    <div id="diario" style="display:none"></div>
  </section>

  <!-- ABA PERFIL -->
  <section id="secPerfil" style="display:none">
    <div id="perfil" class="profile"></div>
  </section>
</div>

<!-- TABS -->
<nav class="tabs">
  <div class="tabs-inner">
    <button class="tab active" id="tabBuscar" onclick="irPara('buscar')">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span data-i18n="nav_search">buscar</span></button>
    <button class="tab" id="tabFeed" onclick="irPara('feed')">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14"/><path d="M5 12h14"/><path d="M5 19h10"/></svg>
      <span data-i18n="nav_feed">feed</span></button>
    <button class="tab" id="tabEstante" onclick="irPara('estante')">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V5a2 2 0 0 1 2-2h2v18H6a2 2 0 0 1-2-2z"/><path d="M10 3h2v18h-2z"/><path d="m15 4 4 1-3 15-4-1z"/></svg>
      <span data-i18n="nav_shelf">estante</span></button>
    <button class="tab" id="tabPerfil" onclick="irPara('perfil')">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      <span data-i18n="nav_profile">perfil</span></button>
  </div>
</nav>

<!-- MODAL CARD -->
<div class="modal" id="modal" onclick="if(event.target===this)fecharModal()">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="bookDetailTitle">
    <button class="modal-x" type="button" onclick="fecharModal()" aria-label="fechar detalhe" data-i18n-aria-label="close_detail">×</button>
    <div id="bookDetail" class="book-detail"></div>
    <canvas id="cardCanvas" class="share-canvas" width="1080" height="1920" aria-hidden="true"></canvas>
    <div class="modal-actions">
      <button class="btn-share-card" onclick="compartilharCard()" data-i18n="share_card">compartilhar card</button>
      <button class="btn-secondary" onclick="copiarLinkPerfil()" data-i18n="copy_link">copiar link</button>
      <button class="btn-secondary" onclick="abrirEditar()" data-i18n="edit_reading">editar leitura</button>
      <button class="btn-danger" onclick="removerLeitura()" data-i18n="remove">remover</button>
    </div>
    <div id="editPanel" class="edit-panel" style="display:none"></div>
  </div>
</div>

<script src="/static/i18n.js?v=20260702c"></script>
<script src="/static/app.js?v=20260702c"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(err => {
        console.warn('service worker não registrado', err);
      });
    });
  }
</script>
</body>
</html>
