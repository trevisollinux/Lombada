<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lombada — diário de leituras</title>
<meta name="description" content="Registre o que leu, com qual edição e tradução. Tipo Letterboxd, mas pra livros." />

<!-- PWA -->
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1A1714" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Lombada" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500;1,9..144,600&family=Spectral:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/app.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="seal">L</div>
      <div class="wordmark">Lombada<span class="dot">.</span></div>
    </div>
    <div class="crumb" id="crumb">estante<b id="meuhandle"></b></div>
  </header>

  <!-- ABA BUSCAR -->
  <section id="secBuscar">
    <!-- busca persistente (fica em todas as telas da aba) -->
    <div class="search">
      <span class="ic"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input id="q" type="text" placeholder="título, autor ou ISBN…" autocomplete="off"
        onkeydown="if(event.key==='Enter')buscar()" oninput="onQInput()" />
      <button onclick="buscar()">buscar</button>
    </div>

    <!-- TELA: home (some quando há busca) -->
    <div id="homeFeed">
      <div class="hero-extra">
        <div class="label">um diário de leituras</div>
        <h1 class="h-display">o que você<br>está lendo<span class="q">?</span></h1>
      </div>
      <div id="lendoAgora"></div>
      <div class="section-head"><div class="label">explore · obras populares</div></div>
      <div class="wall wall-mini" id="populares"></div>
    </div>

    <!-- TELA: resultados de busca -->
    <div id="resultados" style="display:none"></div>
    <!-- TELA: edições da obra -->
    <div id="edicoes" style="display:none"></div>
    <!-- TELA: registrar leitura -->
    <div id="form" style="display:none"></div>
  </section>

  <!-- ABA ESTANTE -->
  <section id="secEstante" style="display:none">
    <div class="screen-head">
      <h2 class="h-section">sua estante</h2>
      <button class="btn-share" onclick="compartilharEstante()">compartilhar</button>
    </div>
    <div id="prateleira"></div>
  </section>

  <!-- ABA DIÁRIO -->
  <section id="secDiario" style="display:none">
    <div class="screen-head">
      <h2 class="h-section">seu diário</h2>
    </div>
    <div id="diario"></div>
  </section>

  <!-- ABA PERFIL -->
  <section id="secPerfil" style="display:none">
    <div id="perfil" class="profile"></div>
  </section>
</div>

<!-- TABS -->
<nav class="tabs">
  <div class="tabs-inner">
    <button class="tab active" id="tabBuscar" onclick="irPara('buscar')">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>buscar</span></button>
    <button class="tab" id="tabEstante" onclick="irPara('estante')">
      <svg viewBox="0 0 24 24"><path d="M4 19V5a2 2 0 0 1 2-2h2v18H6a2 2 0 0 1-2-2z"/><path d="M10 3h2v18h-2z"/><path d="m15 4 4 1-3 15-4-1z"/></svg>
      <span>estante</span></button>
    <button class="tab" id="tabDiario" onclick="irPara('diario')">
      <svg viewBox="0 0 24 24"><path d="M4 4h13a2 2 0 0 1 2 2v14H6a2 2 0 0 1-2-2z"/><line x1="8" y1="8" x2="15" y2="8"/><line x1="8" y1="12" x2="15" y2="12"/></svg>
      <span>diário</span></button>
    <button class="tab" id="tabPerfil" onclick="irPara('perfil')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      <span>perfil</span></button>
  </div>
</nav>

<!-- MODAL CARD -->
<div class="modal" id="modal" onclick="if(event.target===this)fecharModal()">
  <div class="modal-card">
    <canvas id="cardCanvas" width="1080" height="1920"></canvas>
    <div class="modal-actions">
      <button class="btn-share-card" onclick="compartilharCard()">compartilhar card</button>
      <div class="btn-row">
        <button class="btn-secondary" onclick="abrirEditar()">editar</button>
        <button class="btn-close" onclick="fecharModal()">fechar</button>
      </div>
      <button class="btn-danger" onclick="removerLeitura()">remover da estante</button>
    </div>
    <div id="editPanel" class="edit-panel" style="display:none"></div>
  </div>
</div>

<script src="/static/app.js"></script>
<script>
  /* Registro do Service Worker (PWA) */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .catch(err => console.warn('SW não registrado:', err));
    });
  }
</script>
</body>
</html>
