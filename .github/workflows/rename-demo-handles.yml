name: Rename demo handles

# Renomeia usuários demo com handle antigo (prefixo "demo-", de um dump
# anterior) pro handle novo, sem prefixo. Só faz UPDATE de handle -- não
# toca em follows/reviews/likes, ao contrário do seed-demo-users.yml, que
# reseta toda a atividade social demo a cada execução.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without persisting changes"
        required: true
        default: true
        type: boolean

jobs:
  rename-demo-handles:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Run rename
        id: rename
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL secret is required." >&2
            exit 1
          fi
          args=()
          if [ "${DRY_RUN}" = "true" ]; then
            args+=(--dry-run)
          else
            args+=(--apply)
          fi
          python scripts/rename_demo_handles.py "${args[@]}" | tee rename-demo-handles-summary.txt

      - name: Publish summary
        if: always()
        run: |
          echo '## Rename demo handles' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          if [ -f rename-demo-handles-summary.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat rename-demo-handles-summary.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Script did not produce a summary.' >> "$GITHUB_STEP_SUMMARY"
          fi
