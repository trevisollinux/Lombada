name: Sync publishers (Editora 34)

# Mesmo pipeline do sync-publishers.yml, mas cobrindo SÓ a Editora 34 (group
# "editora34" do SOURCES). Foi separada do grupo principal porque a coleta dela
# é por id_range numa faixa ESGOTADA (1–3000, ~800 livros reais): sem o cache de
# ids mortos ela re-baixava ~2200 páginas mortas a cada execução (~37 min),
# segurando o principal. Isolando-a num workflow próprio com cron espaçado, o
# principal termina rápido; e o cache de mortos (tabela publisher_dead_ids, criada
# pelo próprio script) faz as próximas execuções pularem os mortos de graça.
#
# Não instala Chromium: id_range fala direto via requests, sem browser.
#
# Cron a cada 6 HORAS: a faixa está esgotada, então novos livros só aparecem de
# vez em quando (ids novos até id_end) — não compensa rodar de hora em hora.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true = só testa e mostra amostra; false = grava + promove'
        type: choice
        options: ['true', 'false']
        default: 'true'
      diagnose:
        description: 'true = só mostra status/plataforma de cada editora (não coleta)'
        type: choice
        options: ['false', 'true']
        default: 'false'
      max_urls:
        description: 'tamanho do lote: nº de livros por editora nesta execução'
        required: false
        default: '100'
      offset:
        description: 'faixa: começar do livro nº (ex.: 0, depois 100, 200...). Vazio = incremental automático'
        required: false
        default: ''
      slugs:
        description: 'filtrar editoras por slug, separadas por vírgula (vazio = todas do grupo editora34)'
        required: false
        default: ''
      sleep_seconds:
        description: 'pausa entre páginas (segundos) — maior = mais gentil'
        required: false
        default: '1.0'
      dump_url:
        description: 'depura UMA url de livro (mostra JSON-LD/meta/texto) e sai'
        required: false
        default: ''
  # schedule:
  #   # PAUSADO para interromper o consumo automático do banco no Railway.
  #   # Para reativar, remova os comentários das duas linhas abaixo.
  #   - cron: "37 */6 * * *"

permissions:
  contents: read

concurrency:
  group: sync-publishers-editora34
  cancel-in-progress: false

jobs:
  sync-publishers-editora34:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-sync.txt

      - name: Install dependencies
        run: pip install -r requirements-sync.txt

      - name: Sync publisher source records (grupo editora34)
        run: |
          set -o pipefail
          status=0
          python scripts/init_ingestion_tables.py
          python scripts/sync_publishers.py | tee sync_resultado.txt || status=$?
          {
            echo '### Sync Editora 34 -> source_records'
            echo ''
            echo '```'
            cat sync_resultado.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PUBLISHER_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          PUBLISHER_DIAGNOSE: ${{ inputs.diagnose || 'false' }}
          PUBLISHER_DUMP_URL: ${{ inputs.dump_url || '' }}
          PUBLISHER_MAX_URLS: ${{ inputs.max_urls || '250' }}
          PUBLISHER_OFFSET: ${{ inputs.offset || '' }}
          PUBLISHER_SLUGS: ${{ inputs.slugs || '' }}
          PUBLISHER_GROUP: 'editora34'
          PUBLISHER_SLEEP_SECONDS: ${{ inputs.sleep_seconds || '1.0' }}

      - name: Promote new records to catalog
        if: ${{ always() && (inputs.dry_run || 'false') != 'true' && (inputs.diagnose || 'false') != 'true' && (inputs.dump_url || '') == '' }}
        run: |
          set -o pipefail
          status=0
          python scripts/init_ingestion_tables.py
          python scripts/promote_source_records.py | tee promote_resultado.txt || status=$?
          {
            echo '### Promoção source_records -> catálogo'
            echo ''
            echo '```'
            cat promote_resultado.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DRY_RUN: 'false'
          PROMOTE_MIN_CONFIDENCE: '0.5'
          PROMOTE_LIMIT: '5000'
