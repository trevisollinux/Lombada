name: Apply publisher and imprint schema

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feat/publisher-imprint-schema'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Add publisher domain models and migrations
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('models.py')
          text = path.read_text(encoding='utf-8')

          marker = '\n\nclass Edicao(SQLModel, table=True):\n'
          classes = '''

          class PublisherGroup(SQLModel, table=True):
              """Grupo empresarial que pode reunir várias editoras."""
              id: Optional[int] = Field(default=None, primary_key=True)
              name: str
              slug: str = Field(index=True, unique=True)
              website_url: str = ""
              country_code: str = Field(default="BR", index=True)
              active: bool = Field(default=True, index=True)
              created_at: datetime = Field(default_factory=datetime.utcnow)


          class Publisher(SQLModel, table=True):
              """Editora editorial; pode pertencer a um grupo empresarial."""
              id: Optional[int] = Field(default=None, primary_key=True)
              group_id: Optional[int] = Field(default=None, foreign_key="publishergroup.id", index=True)
              name: str
              normalized_name: str = Field(index=True)
              slug: str = Field(index=True, unique=True)
              website_url: str = ""
              country_code: str = Field(default="BR", index=True)
              active: bool = Field(default=True, index=True)
              created_at: datetime = Field(default_factory=datetime.utcnow)


          class Imprint(SQLModel, table=True):
              """Selo editorial pertencente a uma editora."""
              __table_args__ = (
                  UniqueConstraint("publisher_id", "normalized_name", name="uq_imprint_publisher_name"),
              )

              id: Optional[int] = Field(default=None, primary_key=True)
              publisher_id: int = Field(foreign_key="publisher.id", index=True)
              name: str
              normalized_name: str = Field(index=True)
              slug: str = Field(index=True)
              website_url: str = ""
              active: bool = Field(default=True, index=True)
              created_at: datetime = Field(default_factory=datetime.utcnow)


          class PublisherAlias(SQLModel, table=True):
              """Grafia alternativa encontrada em APIs, sites ou registros antigos."""
              __table_args__ = (
                  UniqueConstraint("normalized_alias", name="uq_publisheralias_normalized"),
                  CheckConstraint(
                      "(publisher_id IS NOT NULL) <> (imprint_id IS NOT NULL)",
                      name="ck_publisheralias_one_target",
                  ),
              )

              id: Optional[int] = Field(default=None, primary_key=True)
              alias: str
              normalized_alias: str = Field(index=True)
              publisher_id: Optional[int] = Field(default=None, foreign_key="publisher.id", index=True)
              imprint_id: Optional[int] = Field(default=None, foreign_key="imprint.id", index=True)
              source: str = Field(default="manual", index=True)
              created_at: datetime = Field(default_factory=datetime.utcnow)


          class PublisherSource(SQLModel, table=True):
              """Liga um slug de coleta à editora e, opcionalmente, a um selo."""
              id: Optional[int] = Field(default=None, primary_key=True)
              source: str = Field(index=True, unique=True)
              publisher_id: int = Field(foreign_key="publisher.id", index=True)
              imprint_id: Optional[int] = Field(default=None, foreign_key="imprint.id", index=True)
              base_url: str = ""
              platform: str = ""
              active: bool = Field(default=True, index=True)
              created_at: datetime = Field(default_factory=datetime.utcnow)
          '''
          if 'class PublisherGroup(SQLModel, table=True):' not in text:
              if marker not in text:
                  raise SystemExit('marcador de Edicao não encontrado')
              text = text.replace(marker, classes + marker, 1)

          old_fields = '''    editora:         str           = ""
              tradutor:        str           = ""
          '''
          new_fields = '''    editora:         str           = ""  # compatibilidade/exibição atual
              editora_raw:     str           = ""  # valor original recebido da fonte
              publisher_id:    Optional[int] = Field(default=None, foreign_key="publisher.id", index=True)
              imprint_id:      Optional[int] = Field(default=None, foreign_key="imprint.id", index=True)
              tradutor:        str           = ""
          '''
          if 'editora_raw:' not in text:
              if old_fields not in text:
                  raise SystemExit('campos de Edicao não encontrados')
              text = text.replace(old_fields, new_fields, 1)

          migration_marker = '''    _add_column_if_missing("edicao", "paginas", "ALTER TABLE edicao ADD COLUMN paginas INTEGER")
          '''
          migration_new = '''    _add_column_if_missing("edicao", "paginas", "ALTER TABLE edicao ADD COLUMN paginas INTEGER")
              _add_column_if_missing("edicao", "editora_raw", "ALTER TABLE edicao ADD COLUMN editora_raw VARCHAR DEFAULT ''")
              _add_column_if_missing("edicao", "publisher_id", "ALTER TABLE edicao ADD COLUMN publisher_id INTEGER")
              _add_column_if_missing("edicao", "imprint_id", "ALTER TABLE edicao ADD COLUMN imprint_id INTEGER")
              _run_ddl(
                  "backfill edicao.editora_raw",
                  "UPDATE edicao SET editora_raw = editora WHERE (editora_raw IS NULL OR editora_raw = '') AND editora IS NOT NULL",
              )
          '''
          if '"editora_raw", "ALTER TABLE edicao' not in text:
              if migration_marker not in text:
                  raise SystemExit('marcador de migração de Edicao não encontrado')
              text = text.replace(migration_marker, migration_new, 1)

          index_marker = '''        "CREATE INDEX IF NOT EXISTS ix_useredition_edicao_id ON useredition (edicao_id)",
          '''
          index_new = '''        "CREATE INDEX IF NOT EXISTS ix_useredition_edicao_id ON useredition (edicao_id)",
                  "CREATE INDEX IF NOT EXISTS ix_publisher_group_id ON publisher (group_id)",
                  "CREATE INDEX IF NOT EXISTS ix_imprint_publisher_id ON imprint (publisher_id)",
                  "CREATE INDEX IF NOT EXISTS ix_publisheralias_publisher_id ON publisheralias (publisher_id)",
                  "CREATE INDEX IF NOT EXISTS ix_publisheralias_imprint_id ON publisheralias (imprint_id)",
                  "CREATE INDEX IF NOT EXISTS ix_publishersource_publisher_id ON publishersource (publisher_id)",
                  "CREATE INDEX IF NOT EXISTS ix_publishersource_imprint_id ON publishersource (imprint_id)",
                  "CREATE INDEX IF NOT EXISTS ix_edicao_publisher_id ON edicao (publisher_id)",
                  "CREATE INDEX IF NOT EXISTS ix_edicao_imprint_id ON edicao (imprint_id)",
          '''
          if 'ix_edicao_publisher_id' not in text:
              if index_marker not in text:
                  raise SystemExit('marcador de índices não encontrado')
              text = text.replace(index_marker, index_new, 1)

          identity_old = '''        social_tables = ("catalogsuggestion", "useredition", "follow", "reviewlike", "savedreview", "reviewreport", "readingjournalentry")
                  for table in core_tables + social_tables:
          '''
          identity_new = '''        social_tables = ("catalogsuggestion", "useredition", "follow", "reviewlike", "savedreview", "reviewreport", "readingjournalentry")
                  catalog_tables = ("publishergroup", "publisher", "imprint", "publisheralias", "publishersource")
                  for table in core_tables + social_tables + catalog_tables:
          '''
          if 'catalog_tables = ("publishergroup"' not in text:
              if identity_old not in text:
                  raise SystemExit('marcador de identity não encontrado')
              text = text.replace(identity_old, identity_new, 1)

          path.write_text(text, encoding='utf-8')

          Path('tests/test_publisher_models.py').write_text('''"""Testes do domínio normalizado de editoras e selos."""
          import unittest
          from unittest.mock import patch

          import models


          class PublisherModelsTest(unittest.TestCase):
              def test_expected_tables_are_registered(self):
                  expected = {
                      "publishergroup",
                      "publisher",
                      "imprint",
                      "publisheralias",
                      "publishersource",
                  }
                  self.assertTrue(expected.issubset(models.SQLModel.metadata.tables))

              def test_edition_keeps_legacy_name_and_optional_references(self):
                  columns = models.Edicao.__table__.columns
                  self.assertIn("editora", columns)
                  self.assertIn("editora_raw", columns)
                  self.assertTrue(columns["publisher_id"].nullable)
                  self.assertTrue(columns["imprint_id"].nullable)
                  self.assertEqual(
                      next(iter(columns["publisher_id"].foreign_keys)).target_fullname,
                      "publisher.id",
                  )
                  self.assertEqual(
                      next(iter(columns["imprint_id"].foreign_keys)).target_fullname,
                      "imprint.id",
                  )

              def test_imprint_name_is_unique_inside_publisher(self):
                  names = {constraint.name for constraint in models.Imprint.__table__.constraints}
                  self.assertIn("uq_imprint_publisher_name", names)

              def test_alias_targets_exactly_one_entity(self):
                  names = {constraint.name for constraint in models.PublisherAlias.__table__.constraints}
                  self.assertIn("ck_publisheralias_one_target", names)
                  self.assertIn("uq_publisheralias_normalized", names)

              def test_migration_adds_edition_reference_columns(self):
                  with patch.object(models, "_is_postgres", return_value=False), patch.object(
                      models, "_add_column_if_missing"
                  ) as add_column, patch.object(models, "_run_ddl"):
                      models.migrar()

                  calls = {(call.args[0], call.args[1]) for call in add_column.call_args_list}
                  self.assertIn(("edicao", "editora_raw"), calls)
                  self.assertIn(("edicao", "publisher_id"), calls)
                  self.assertIn(("edicao", "imprint_id"), calls)


          if __name__ == "__main__":
              unittest.main()
          ''', encoding='utf-8')
          PY

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-sync.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Commit validated schema
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add models.py tests/test_publisher_models.py
          if git diff --cached --quiet; then
            echo 'Schema já aplicado; nada para commitar.'
            exit 0
          fi
          git commit -m 'feat: add publisher and imprint domain models'
          git push origin HEAD:${{ github.head_ref }}
