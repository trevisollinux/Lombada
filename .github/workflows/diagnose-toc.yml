name: Diagnose Open Library table_of_contents coverage (temp)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Check table_of_contents coverage
        run: |
          python - <<'PYEOF'
          import requests, time, json

          HEADERS = {
              "Accept": "application/json",
              "User-Agent": "LombadaTOCDiagnose/0.1 (+https://lombada.onrender.com)",
          }

          TERMS = [
              "Dom Casmurro", "Memorias Postumas Bras Cubas", "1984 Orwell",
              "O Alquimista Paulo Coelho", "Crime e Castigo", "Os Irmaos Karamazov",
              "Cem Anos de Solidao", "A Hora da Estrela", "Grande Sertao Veredas",
              "Capitaes da Areia", "O Cortico", "Vidas Secas", "A Metamorfose Kafka",
              "Iracema Jose de Alencar", "Senhora Jose de Alencar",
          ]

          total_editions = 0
          total_with_toc = 0
          pt_editions = 0
          pt_with_toc = 0
          samples = []

          for term in TERMS:
              try:
                  r = requests.get("https://openlibrary.org/search.json",
                                    params={"q": term, "limit": 1, "fields": "key,title"},
                                    headers=HEADERS, timeout=20)
                  r.raise_for_status()
                  docs = r.json().get("docs") or []
              except Exception as exc:
                  print(f"term={term!r} search FAILED: {exc}")
                  continue
              if not docs:
                  print(f"term={term!r} no work found")
                  continue
              work_key = docs[0]["key"]
              print(f"term={term!r} -> work={work_key} title={docs[0].get('title')!r}")
              try:
                  r = requests.get(f"https://openlibrary.org{work_key}/editions.json",
                                    params={"limit": 20}, headers=HEADERS, timeout=20)
                  r.raise_for_status()
                  entries = r.json().get("entries") or []
              except Exception as exc:
                  print(f"  editions FAILED: {exc}")
                  continue
              for ed in entries:
                  total_editions += 1
                  toc = ed.get("table_of_contents")
                  langs = ed.get("languages") or []
                  is_pt = any(l.get("key", "").endswith("/por") for l in langs)
                  if is_pt:
                      pt_editions += 1
                  if toc:
                      total_with_toc += 1
                      if is_pt:
                          pt_with_toc += 1
                      if len(samples) < 5:
                          samples.append({
                              "work": work_key,
                              "edition": ed.get("key"),
                              "lang": langs,
                              "toc_sample": toc[:5],
                          })
              time.sleep(0.5)

          print()
          print(f"total editions checked: {total_editions}")
          print(f"editions WITH table_of_contents: {total_with_toc}")
          print(f"pt-language editions checked: {pt_editions}")
          print(f"pt-language editions WITH table_of_contents: {pt_with_toc}")
          print()
          print("samples:")
          print(json.dumps(samples, indent=2, ensure_ascii=False)[:4000])
          PYEOF
