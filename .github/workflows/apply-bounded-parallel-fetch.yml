name: Apply bounded parallel fetch patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-and-smoke:
    if: github.head_ref == 'perf/bounded-parallel-page-fetch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply bounded concurrency patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/sync_publishers.py')
          text = path.read_text(encoding='utf-8')

          if 'from concurrent.futures import ThreadPoolExecutor' not in text:
              text = text.replace(
                  'from collections import deque\n',
                  'from collections import deque\nfrom concurrent.futures import ThreadPoolExecutor\n',
                  1,
              )
          if '\nimport threading\n' not in text:
              text = text.replace('import sys\nimport time\n', 'import sys\nimport threading\nimport time\n', 1)

          old_session = '''SESSION = requests.Session()
          SESSION.headers.update(HEADERS)
          '''
          new_session = '''SESSION = requests.Session()
          SESSION.headers.update(HEADERS)
          DEFAULT_FETCH_CONCURRENCY = 4
          MAX_FETCH_CONCURRENCY = 8
          _FETCH_CONTEXT = threading.local()
          _FETCH_DIAGNOSTIC_LOCK = threading.Lock()


          def fetch_concurrency() -> int:
              """Concorrência conservadora e configurável para hidratar páginas de livro."""
              raw = os.getenv("PUBLISHER_FETCH_CONCURRENCY", str(DEFAULT_FETCH_CONCURRENCY)).strip()
              try:
                  value = int(raw)
              except ValueError:
                  value = DEFAULT_FETCH_CONCURRENCY
              return min(MAX_FETCH_CONCURRENCY, max(1, value))


          def _session_for_fetch() -> requests.Session:
              """Mantém SESSION no fluxo sequencial e uma Session por worker no paralelo."""
              if not getattr(_FETCH_CONTEXT, "parallel_worker", False):
                  return SESSION
              session = getattr(_FETCH_CONTEXT, "session", None)
              if session is None:
                  session = requests.Session()
                  session.headers.update(HEADERS)
                  _FETCH_CONTEXT.session = session
              return session


          def _extract_page_parallel(url: str, publisher: dict[str, str]):
              _FETCH_CONTEXT.parallel_worker = True
              try:
                  return extract_page(url, publisher)
              finally:
                  _FETCH_CONTEXT.parallel_worker = False
          '''
          if 'def fetch_concurrency()' not in text:
              if old_session not in text:
                  raise SystemExit('bloco SESSION não encontrado')
              text = text.replace(old_session, new_session, 1)

          old_failure = '''def _record_fetch_failure(reason: str, url: str = "") -> None:
              FETCH_FAILURE_COUNTS[reason] = FETCH_FAILURE_COUNTS.get(reason, 0) + 1
              if url:
                  samples = FETCH_FAILURE_SAMPLES.setdefault(reason, [])
                  if len(samples) < 3:
                      samples.append(url)
          '''
          new_failure = '''def _record_fetch_failure(reason: str, url: str = "") -> None:
              with _FETCH_DIAGNOSTIC_LOCK:
                  FETCH_FAILURE_COUNTS[reason] = FETCH_FAILURE_COUNTS.get(reason, 0) + 1
                  if url:
                      samples = FETCH_FAILURE_SAMPLES.setdefault(reason, [])
                      if len(samples) < 3:
                          samples.append(url)
          '''
          if new_failure not in text:
              if old_failure not in text:
                  raise SystemExit('bloco de diagnóstico não encontrado')
              text = text.replace(old_failure, new_failure, 1)

          text = text.replace(
              'response = SESSION.get(url, headers=headers, timeout=REQUEST_TIMEOUT_SECONDS)',
              'response = _session_for_fetch().get(url, headers=headers, timeout=REQUEST_TIMEOUT_SECONDS)',
              1,
          )

          start = text.index('def _collect_from_urls(')
          end = text.index('\ndef collect_via_sitemap(', start)
          new_function = '''def _collect_from_urls(
              book_urls: list[str],
              publisher: dict[str, str],
              max_urls: int,
              sleep_seconds: float,
              seen: set[str] | None = None,
              offset: int | None = None,
          ) -> list[tuple[dict[str, Any], dict[str, Any]]]:
              """Baixa páginas em pequenos lotes paralelos, preservando a ordem.

              O limite é por processo/editora e fica entre 1 e 8 workers. A pausa passa
              a acontecer entre lotes, evitando uma rajada contínua contra o mesmo host.
              O id_range continua sequencial porque usa LAST_FETCH_STATUS para classificar
              IDs mortos; esta função atende sitemap e crawl HTML.
              """
              workers = fetch_concurrency()
              seen = seen or set()
              local_seen: set[str] = set()

              if offset is not None:
                  source_urls = book_urls[offset : offset + max_urls]
                  print(
                      f"  faixa: {offset}–{offset + len(source_urls) - 1} "
                      f"de {len(book_urls)} candidatos"
                  )
              else:
                  source_urls = book_urls

              candidates: list[str] = []
              max_attempts = max_urls if offset is not None else max_urls * 3
              for url in source_urls:
                  if len(candidates) >= max_attempts:
                      break
                  external_id = stable_external_id(url)
                  if external_id in seen or external_id in local_seen:
                      continue
                  local_seen.add(external_id)
                  candidates.append(url)

              if not candidates:
                  return []

              records: list[tuple[dict[str, Any], dict[str, Any]]] = []
              pool_size = min(workers, len(candidates))
              print(
                  f"  hidratação: candidatos={len(candidates)} "
                  f"concorrência={pool_size}"
              )
              with ThreadPoolExecutor(max_workers=pool_size) as executor:
                  for start_index in range(0, len(candidates), pool_size):
                      batch = candidates[start_index : start_index + pool_size]
                      extracted_batch = executor.map(
                          lambda url: _extract_page_parallel(url, publisher),
                          batch,
                      )
                      for extracted in extracted_batch:
                          if extracted is not None and len(records) < max_urls:
                              records.append(extracted)
                      if len(records) >= max_urls:
                          break
                      if sleep_seconds and start_index + pool_size < len(candidates):
                          time.sleep(sleep_seconds)
              return records
          '''
          text = text[:start] + new_function + '\n\n' + text[end + 1:]
          path.write_text(text, encoding='utf-8')

          Path('tests/test_sync_publishers_concurrency.py').write_text(
          '''"""Testes do paralelismo limitado na hidratação de páginas de livro."""
          import os
          import sys
          import threading
          import time
          import unittest
          from unittest.mock import patch

          sys.path.insert(0, os.path.join(os.path.dirname(__file__), "..", "scripts"))

          import sync_publishers as sp  # noqa: E402


          def extracted(url):
              normalized = {
                  "title": url.rsplit("/", 1)[-1],
                  "author": "Autor",
                  "isbn": "",
                  "permalink": url,
              }
              return normalized, {"url": url}


          class BoundedParallelFetchTest(unittest.TestCase):
              def test_uses_bounded_concurrency_and_preserves_order(self):
                  lock = threading.Lock()
                  active = 0
                  max_active = 0

                  def fake_extract(url, publisher):
                      nonlocal active, max_active
                      with lock:
                          active += 1
                          max_active = max(max_active, active)
                      time.sleep(0.04)
                      with lock:
                          active -= 1
                      return extracted(url)

                  urls = [f"https://example.test/livro/{n}" for n in range(8)]
                  with patch.dict(os.environ, {"PUBLISHER_FETCH_CONCURRENCY": "4"}), patch.object(
                      sp, "extract_page", side_effect=fake_extract
                  ):
                      records = sp._collect_from_urls(
                          urls, {"slug": "teste"}, max_urls=8, sleep_seconds=0
                      )

                  self.assertEqual([item[0]["permalink"] for item in records], urls)
                  self.assertGreaterEqual(max_active, 2)
                  self.assertLessEqual(max_active, 4)

              def test_stops_after_first_successful_batch(self):
                  calls = []

                  def fake_extract(url, publisher):
                      calls.append(url)
                      return extracted(url)

                  urls = [f"https://example.test/livro/{n}" for n in range(12)]
                  with patch.dict(os.environ, {"PUBLISHER_FETCH_CONCURRENCY": "4"}), patch.object(
                      sp, "extract_page", side_effect=fake_extract
                  ):
                      records = sp._collect_from_urls(
                          urls, {"slug": "teste"}, max_urls=2, sleep_seconds=0
                      )

                  self.assertEqual(len(records), 2)
                  self.assertEqual(len(calls), 4)

              def test_skips_seen_and_duplicate_urls_before_scheduling(self):
                  calls = []
                  urls = [
                      "https://example.test/livro/1",
                      "https://example.test/livro/1",
                      "https://example.test/livro/2",
                  ]
                  seen = {sp.stable_external_id(urls[0])}

                  with patch.dict(os.environ, {"PUBLISHER_FETCH_CONCURRENCY": "4"}), patch.object(
                      sp, "extract_page", side_effect=lambda url, publisher: calls.append(url) or extracted(url)
                  ):
                      records = sp._collect_from_urls(
                          urls,
                          {"slug": "teste"},
                          max_urls=2,
                          sleep_seconds=0,
                          seen=seen,
                      )

                  self.assertEqual(calls, ["https://example.test/livro/2"])
                  self.assertEqual(len(records), 1)

              def test_concurrency_setting_is_clamped(self):
                  with patch.dict(os.environ, {"PUBLISHER_FETCH_CONCURRENCY": "99"}):
                      self.assertEqual(sp.fetch_concurrency(), 8)
                  with patch.dict(os.environ, {"PUBLISHER_FETCH_CONCURRENCY": "0"}):
                      self.assertEqual(sp.fetch_concurrency(), 1)
                  with patch.dict(os.environ, {"PUBLISHER_FETCH_CONCURRENCY": "invalido"}):
                      self.assertEqual(sp.fetch_concurrency(), 4)


          if __name__ == "__main__":
              unittest.main()
          ''', encoding='utf-8')
          PY

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-sync.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Live smoke with five Boitempo books
        env:
          PUBLISHER_DRY_RUN: 'true'
          PUBLISHER_MAX_URLS: '5'
          PUBLISHER_SLUGS: 'boitempo'
          PUBLISHER_SLEEP_SECONDS: '0.2'
          PUBLISHER_FETCH_CONCURRENCY: '4'
        run: |
          set -o pipefail
          python scripts/sync_publishers.py | tee scraper-smoke.txt
          grep -Eq 'DRY_RUN: [1-9][0-9]* registros novos coletados' scraper-smoke.txt
          {
            echo '### Scraper smoke — Boitempo, 5 livros'
            echo '```'
            cat scraper-smoke.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit validated patch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/sync_publishers.py tests/test_sync_publishers_concurrency.py
          if git diff --cached --quiet; then
            echo 'Patch já aplicado; nada para commitar.'
            exit 0
          fi
          git commit -m 'perf: hydrate book pages with bounded concurrency'
          git push origin HEAD:${{ github.head_ref }}
