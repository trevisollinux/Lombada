name: Exchange Mercado Livre authorization code

on:
  workflow_dispatch:

jobs:
  meli-exchange-code:
    runs-on: ubuntu-latest

    env:
      MELI_APP_ID: ${{ secrets.MELI_APP_ID }}
      MELI_CLIENT_SECRET: ${{ secrets.MELI_CLIENT_SECRET }}
      MELI_REDIRECT_URI: ${{ secrets.MELI_REDIRECT_URI }}
      MELI_AUTH_CODE: ${{ secrets.MELI_AUTH_CODE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sync dependencies
        run: python -m pip install -r requirements-sync.txt

      - name: Exchange Mercado Livre authorization code
        run: python scripts/meli_exchange_code.py
