name: Verify publisher sync dispatches once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/run-all-publisher-syncs-once.yml

permissions:
  actions: read
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Record the dispatched publisher runs
        env:
          GH_TOKEN: ${{ github.token }}
          STARTED_AFTER: '2026-07-14T19:41:00Z'
        run: |
          set -euo pipefail

          workflows=(
            sync-publishers.yml
            sync-publishers-expansao.yml
            sync-publishers-universitarias.yml
            sync-publishers-cia.yml
            sync-publishers-editora34.yml
            sync-publishers-trade.yml
            sync-publishers-trade-lenta.yml
          )

          status_file="publisher-sync-dispatch-status.json"
          jq -n --arg checked_at "$(date -u +%FT%TZ)" '{checked_at:$checked_at,runs:[]}' > "$status_file"

          missing=0
          for workflow in "${workflows[@]}"; do
            run=''
            for attempt in $(seq 1 20); do
              run=$(gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow "$workflow" \
                --event workflow_dispatch \
                --limit 10 \
                --json databaseId,status,conclusion,createdAt,url,workflowName \
                --jq "[.[] | select(.createdAt >= \"${STARTED_AFTER}\")][0] // empty")
              [ -n "$run" ] && break
              sleep 15
            done

            if [ -z "$run" ]; then
              missing=$((missing + 1))
              run=$(jq -n --arg workflow "$workflow" '{workflow:$workflow,status:"missing"}')
            else
              run=$(jq --arg workflow "$workflow" '. + {workflow_file:$workflow}' <<< "$run")
            fi

            jq --argjson run "$run" '.runs += [$run]' "$status_file" > "$status_file.tmp"
            mv "$status_file.tmp" "$status_file"
          done

          encoded=$(base64 -w0 "$status_file")
          gh api --method PUT \
            "repos/${GITHUB_REPOSITORY}/contents/.github/publisher-sync-dispatch-status.json" \
            -f message='chore: registra status dos syncs de editoras' \
            -f content="$encoded" \
            -f branch=main

          test "$missing" -eq 0
