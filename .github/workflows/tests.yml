name: Tests

# Testes de regressão e smoke: importam a aplicação, validam rotas principais e
# contratos estáticos da interface antes do deploy. Usa a mesma versão mínima de
# Python exigida pela aplicação em produção e valida isoladamente o novo frontend.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-sync.txt

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt -r requirements-sync.txt

      - name: Run tests
        id: tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -q > test-output.txt 2>&1
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload failure report
        if: steps.tests.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-report
          path: test-output.txt
          retention-days: 7

      - name: Print test summary
        if: always()
        run: tail -n 120 test-output.txt

      - name: Fail when tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check and build frontend
        run: npm run build

  container:
    runs-on: ubuntu-latest
    needs: [smoke, frontend]
    steps:
      - uses: actions/checkout@v7

      - name: Build production image
        run: docker build --tag lombada-app-v2:ci .
