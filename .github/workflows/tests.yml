name: Tests

# Smoke tests: importa a aplicação e bate nas rotas principais. Não
# substitui testes de unidade -- existe pra pegar erro de import/sintaxe
# ou rota quebrada antes do deploy (roda na mesma versão de Python do
# runtime.txt, que é o que o Render usa em produção).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-sync.txt

      - name: Run smoke tests
        run: python -m unittest discover -s tests -v
