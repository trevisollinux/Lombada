name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  apply-author-search-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/author-search-coverage'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-sync.txt

      - name: Apply patch
        run: python scripts/apply_author_search_fix.py

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-sync.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Commit tested fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/tests.yml
          rm -f .github/workflows/apply-author-search-fix.yml
          rm -f .github/author-search-trigger
          rm -f scripts/apply_author_search_fix.py
          git add -A
          git commit -m "fix: improve author search coverage"
          git push origin HEAD:fix/author-search-coverage

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-sync.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-sync.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v
