name: Tests

# Testes de regressão e smoke: importam a aplicação, validam rotas principais e
# contratos estáticos da interface antes do deploy. Usa a mesma versão mínima de
# Python exigida pela aplicação em produção.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-sync.txt

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt -r requirements-sync.txt

      - name: Run tests
        run: python -m unittest discover -s tests -q
