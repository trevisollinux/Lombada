name: List catalog

# Lista o que já está na base: resumo por editora + catálogo da busca + os livros.
# Dispare pela aba Actions (funciona do celular). O resultado sai no Summary do run.

on:
  workflow_dispatch:
    inputs:
      slugs:
        description: 'filtrar por editora(s), slugs separados por vírgula (vazio = todas)'
        required: false
        default: ''
      limit:
        description: 'máx. de livros na listagem'
        required: false
        default: '500'
      only_isbn:
        description: 'listar só os que têm ISBN'
        type: choice
        options: ['false', 'true']
        default: 'false'

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-sync.txt

      # TEMPORÁRIO (branch claude/lombada-catalog-coverage-q3mm3w): diagnose das
      # editoras novas dos grupos expansao/universitaria. Os workflows novos só
      # ficam dispatcháveis quando chegarem na main, e o grupo sync-publishers
      # está ocupado — este workflow já é registrado e tem grupo livre. Será
      # revertido pro list_catalog.py antes do merge.
      - name: List catalog
        run: |
          python scripts/sync_publishers.py | tee lista.txt
          {
            echo '### Diagnose editoras novas (expansao + universitaria)'
            echo ''
            echo '```'
            cat lista.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          PUBLISHER_DIAGNOSE: 'true'
          PUBLISHER_SLUGS: 'rocco,arqueiro,aleph,darkside,boitempo,ubu,antofagica,carambaia,altabooks,lpm,edusp,editora_unesp,editora_unicamp,editora_ufmg,edufba,editora_ufsc,edipucrs,editora_unb'
