name: Terraform

# Infra do Lombada como código (diretório infra/).
#   - PR que toca infra/**  -> fmt + validate + plan (comenta o plan no PR)
#   - push na main          -> apply (protegido pelo environment "production")
#   - workflow_dispatch      -> apply manual (aba Actions)
#
# Segredos necessários (Settings > Secrets and variables > Actions):
#   RENDER_API_KEY, RENDER_OWNER_ID
#   TF_DATABASE_URL, TF_SECRET_KEY, e demais TF_* opcionais abaixo
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  (token do R2, para o state)

on:
  pull_request:
    paths: ['infra/**', '.github/workflows/terraform.yml']
  push:
    branches: [main]
    paths: ['infra/**', '.github/workflows/terraform.yml']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: 'true'
  # Provider
  TF_VAR_render_api_key: ${{ secrets.RENDER_API_KEY }}
  TF_VAR_render_owner_id: ${{ secrets.RENDER_OWNER_ID }}
  # Segredos da app (mesmos valores já no Render)
  TF_VAR_database_url: ${{ secrets.TF_DATABASE_URL }}
  TF_VAR_secret_key: ${{ secrets.TF_SECRET_KEY }}
  TF_VAR_google_client_id: ${{ secrets.TF_GOOGLE_CLIENT_ID }}
  TF_VAR_google_client_secret: ${{ secrets.TF_GOOGLE_CLIENT_SECRET }}
  TF_VAR_google_books_api_key: ${{ secrets.TF_GOOGLE_BOOKS_API_KEY }}
  TF_VAR_hardcover_api_key: ${{ secrets.TF_HARDCOVER_API_KEY }}
  TF_VAR_penguin_api_key: ${{ secrets.TF_PENGUIN_API_KEY }}
  TF_VAR_me_token: ${{ secrets.TF_ME_TOKEN }}
  TF_VAR_recon_token: ${{ secrets.TF_RECON_TOKEN }}
  TF_VAR_admin_emails: ${{ vars.TF_ADMIN_EMAILS }}
  # State no R2
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

defaults:
  run:
    working-directory: infra

jobs:
  # ── Validação estática: roda em qualquer evento, sem tocar backend/segredos ──
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'
      - name: Format
        run: terraform fmt -check -recursive
      - name: Validate
        run: |
          terraform init -backend=false -input=false
          terraform validate

  # ── Plan em PR ──────────────────────────────────────────────────────────
  plan:
    if: github.event_name == 'pull_request'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'
      - name: Init
        run: terraform init -input=false
      - name: Plan
        id: plan
        run: terraform plan -input=false -no-color -out=tfplan
      - name: Comentar plan no PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const out = '${{ steps.plan.outputs.stdout }}';
            const body = `#### Terraform Plan \`${{ steps.plan.outcome }}\`\n<details><summary>ver plan</summary>\n\n\`\`\`\n${out}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body.slice(0, 65000)
            });

  # ── Apply na main / manual ──────────────────────────────────────────────
  apply:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: check
    runs-on: ubuntu-latest
    environment: production # exige aprovação se o environment estiver protegido
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'
      - name: Init
        run: terraform init -input=false
      - name: Apply
        run: terraform apply -input=false -auto-approve
