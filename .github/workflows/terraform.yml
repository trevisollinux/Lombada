name: Terraform

# Migração segura para Railway + Cloudflare.
# O workflow executa fmt, validate e plan remoto no HCP Terraform.
# Não existe job de apply durante a adoção dos recursos existentes.

on:
  pull_request:
    paths: ['infra/**', 'railway.toml', '.github/workflows/terraform.yml']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: 'true'

defaults:
  run:
    working-directory: infra

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Format
        run: terraform fmt -check -recursive

      - name: Init HCP Terraform
        run: terraform init -input=false

      - name: Validate
        run: terraform validate

      - name: Plan de adoção
        shell: bash
        run: |
          set -o pipefail
          terraform plan -input=false -no-color | tee plan.txt

      - name: Salvar saída do plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/plan.txt
          if-no-files-found: error
          retention-days: 7

      # Segurança: não adicionar terraform apply enquanto o plan mostrar
      # qualquer destroy ou substituição dos recursos existentes.
