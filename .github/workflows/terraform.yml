name: Terraform

# Infra do Lombada como código (diretório infra/), com state e execução remota
# no Terraform Cloud (HCP Terraform).
#   - PR que toca infra/**  -> fmt + plan remoto (comentado no PR)
#   - push na main          -> apply remoto (protegido pelo environment "production")
#   - workflow_dispatch      -> apply manual (aba Actions)
#
# Os segredos da aplicação (render_api_key, database_url, etc.) NÃO ficam aqui:
# são variáveis do workspace no Terraform Cloud (marcadas sensitive). O único
# segredo do GitHub é o token da API do TFC.
#
# Segredo necessário (Settings > Secrets and variables > Actions):
#   TF_API_TOKEN  -> token de usuário/equipe do Terraform Cloud

on:
  pull_request:
    paths: ['infra/**', '.github/workflows/terraform.yml']
  push:
    branches: [main]
    paths: ['infra/**', '.github/workflows/terraform.yml']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: 'true'

defaults:
  run:
    working-directory: infra

jobs:
  # ── fmt: local, não precisa de token. É o gate que sempre roda. ────────────
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'
      - run: terraform fmt -check -recursive

  # ── Terraform Cloud configurado? Gate para plan/apply. ─────────────────────
  # secrets não podem ser lidos direto no `if:` de um job; então mapeamos a
  # presença do token para um output booleano (sem expor o valor).
  config:
    runs-on: ubuntu-latest
    outputs:
      tfc_ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
        run: |
          if [ -n "$TF_API_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Terraform Cloud não configurado::plan/apply pulados até cadastrar o secret TF_API_TOKEN e a organização real em versions.tf."
          fi

  # ── plan remoto em PR ─────────────────────────────────────────────────────
  plan:
    if: github.event_name == 'pull_request' && needs.config.outputs.tfc_ready == 'true'
    needs: [fmt, config]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      - name: Init
        run: terraform init -input=false
      - name: Validate
        run: terraform validate
      - name: Plan
        id: plan
        run: terraform plan -input=false -no-color
      - name: Comentar plan no PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const out = `${{ steps.plan.outputs.stdout }}`;
            const body = `#### Terraform Plan \`${{ steps.plan.outcome }}\`\n<details><summary>ver plan (executado no Terraform Cloud)</summary>\n\n\`\`\`\n${out}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body.slice(0, 65000)
            });

  # ── apply remoto na main / manual ─────────────────────────────────────────
  apply:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.config.outputs.tfc_ready == 'true'
    needs: [fmt, config]
    runs-on: ubuntu-latest
    environment: production # exige aprovação se o environment estiver protegido
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      - name: Init
        run: terraform init -input=false
      - name: Apply
        run: terraform apply -input=false -auto-approve
