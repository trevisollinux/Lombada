name: Keep Render Alive

on:
  schedule:
    # A cada 20 minutos. Observação: Render Free pode dormir após ~15 min sem tráfego,
    # então isto é um keep-alive econômico, não garantia absoluta de zero cold start.
    - cron: "7/20 * * * *"
  workflow_dispatch:

concurrency:
  group: render-keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render healthcheck
        run: |
          # Trocar para "https://lombada.app/healthz" quando o domínio estiver configurado.
          curl -fsS --max-time 20 "https://SEU-APP.onrender.com/healthz" || true
