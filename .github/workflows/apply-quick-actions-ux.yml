name: Apply quick actions UX

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'ux/simplify-quick-actions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply quick actions UX
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap


          def replace_between(text, start_marker, end_marker, replacement):
              start = text.index(start_marker)
              end = text.index(end_marker, start)
              return text[:start] + replacement + "\n" + text[end:]


          app = Path('static/app.js')
          js = app.read_text(encoding='utf-8')

          old_diary = '''function abrirDiarioLeitura(idx){
            if(idx<0) return;
            irPara('estante',{subaba:'diario'});
            abrirCard(idx,{registrar:false});
            setTimeout(()=>{
              const alvo=document.getElementById('diaryNewForm')||document.querySelector('[data-diary-form]');
              alvo?.scrollIntoView({behavior:'smooth',block:'start'});
              alvo?.querySelector('input, textarea, button')?.focus?.({preventScroll:true});
            },120);
          }
          '''
          new_diary = '''function abrirDiarioLeitura(idx,opcoes={}){
            if(idx<0) return;
            irPara('estante',{subaba:'diario'});
            abrirCard(idx,{registrar:false});
            setTimeout(()=>{
              const alvo=document.getElementById('diaryNewForm')||document.querySelector('[data-diary-form]');
              alvo?.scrollIntoView({behavior:'smooth',block:'start'});
              const seletor=opcoes.foco==='nota'
                ? '[data-diary-input="nota"], textarea'
                : 'input, textarea, button';
              alvo?.querySelector(seletor)?.focus?.({preventScroll:true});
            },120);
          }
          '''
          if "opcoes.foco==='nota'" not in js:
              if old_diary not in js:
                  raise SystemExit('abrirDiarioLeitura não encontrado')
              js = js.replace(old_diary, new_diary, 1)

          quick_start = 'function leiturasEmAndamento(){'
          quick_end = '/* swipe horizontal alterna subabas'
          new_quick = textwrap.dedent('''
          function leiturasEmAndamento(){
            return prateleira.map((l,idx)=>({l,idx})).filter(item=>item.l?.status==='Lendo');
          }
          function indiceLeituraRapida(){
            const lendo=leiturasEmAndamento();
            const select=$('#quickReadingSelect');
            const selecionado=select?Number(select.value):NaN;
            if(Number.isInteger(selecionado)&&prateleira[selecionado]?.status==='Lendo') return selecionado;
            return lendo[0]?.idx ?? null;
          }
          function registrarLeituraRapida(){
            fecharAcoesLeitura();
            irPara('buscar');
            setTimeout(()=>{ $('#q')?.focus(); },120);
          }
          function atualizarProgressoRapido(){
            const alvo=indiceLeituraRapida();
            if(alvo===null){ registrarLeituraRapida(); return; }
            fecharAcoesLeitura();
            abrirDiarioLeitura(alvo);
          }
          function adicionarNotaRapida(){
            const alvo=indiceLeituraRapida();
            if(alvo===null){ registrarLeituraRapida(); return; }
            fecharAcoesLeitura();
            abrirDiarioLeitura(alvo,{foco:'nota'});
          }
          function seletorLeituraRapidaHTML(lendo){
            if(lendo.length<2) return '';
            return `<label class="quick-reading-picker"><span>${t('currently_reading')}</span><select id="quickReadingSelect" aria-label="${t('currently_reading')}">${lendo.map(({l,idx})=>`<option value="${idx}">${esc(l.titulo)}${l.autor?' — '+esc(l.autor):''}</option>`).join('')}</select></label>`;
          }
          function renderAcoesLeitura(){
            const body=$('#quickActionsBody'); if(!body) return;
            const lendo=leiturasEmAndamento();
            const hint=$('#quickActionsHint');
            if(hint) hint.textContent=t(lendo.length?'quick_actions_hint_active':'quick_actions_hint_empty');
            if(!lendo.length){
              body.innerHTML=`<button class="quick-action primary" type="button" onclick="registrarLeituraRapida()"><strong>${t('quick_register_reading')}</strong><span>${t('quick_register_hint_empty')}</span></button>`;
              return;
            }
            body.innerHTML=`${seletorLeituraRapidaHTML(lendo)}<div class="quick-actions-grid">
              <button class="quick-action primary" type="button" onclick="atualizarProgressoRapido()"><strong>${t('update_progress')}</strong><span>${t('quick_update_hint')}</span></button>
              <button class="quick-action" type="button" onclick="adicionarNotaRapida()"><strong>${t('entry_note')}</strong><span>${t('new_diary_subtitle')}</span></button>
              <button class="quick-action" type="button" onclick="registrarLeituraRapida()"><strong>${t('quick_register_new_reading')}</strong><span>${t('quick_register_new_hint')}</span></button>
            </div>`;
          }
          function abrirAcoesLeitura(){
            renderAcoesLeitura();
            const panel=$('#quickActions'); if(!panel) return;
            panel.hidden=false;
            $('#tabAdd')?.setAttribute('aria-expanded','true');
            document.body.classList.add('quick-actions-open');
            setTimeout(()=>panel.querySelector('button:not([disabled])')?.focus?.({preventScroll:true}),30);
          }
          function fecharAcoesLeitura(){
            const panel=$('#quickActions'); if(!panel) return;
            panel.hidden=true;
            $('#tabAdd')?.setAttribute('aria-expanded','false');
            document.body.classList.remove('quick-actions-open');
          }
          /* botão central "+": abre ações rápidas de leitura */
          function abrirRegistro(event){
            event?.preventDefault?.();
            const panel=$('#quickActions');
            if(panel && !panel.hidden) fecharAcoesLeitura(); else abrirAcoesLeitura();
          }

          ''').lstrip()
          if 'function adicionarNotaRapida()' not in js:
              js = replace_between(js, quick_start, quick_end, new_quick)

          app.write_text(js, encoding='utf-8')

          css = Path('static/app.css')
          styles = css.read_text(encoding='utf-8')
          marker = '/* Quick actions: one reading selector and three predictable actions. */'
          if marker not in styles:
              styles += textwrap.dedent('''

              /* Quick actions: one reading selector and three predictable actions. */
              .quick-reading-picker{display:grid;gap:7px;padding:2px 1px 4px;color:var(--text-secondary,var(--dim));font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase}
              .quick-reading-picker select{width:100%;min-height:44px;border:1px solid var(--rule);border-radius:13px;background:var(--paper-2);color:var(--ink);padding:9px 12px;font-family:"Spectral",serif;font-size:15px;line-height:1.2;text-transform:none;letter-spacing:0}
              .quick-actions-grid{display:grid;gap:9px}
              .quick-actions-grid .quick-action{min-height:64px;justify-content:center}
              .quick-actions-grid .quick-action strong{font-size:14px}
              .quick-actions-grid .quick-action span{font-size:12.5px;line-height:1.3}
              @media(min-width:480px){.quick-actions-grid{grid-template-columns:1fr 1fr}.quick-actions-grid .quick-action:last-child{grid-column:1/-1}}
              ''')
          css.write_text(styles, encoding='utf-8')

          Path('tests/test_quick_actions_ux.py').write_text(textwrap.dedent('''
          """Regression tests for the central quick-actions sheet."""
          from pathlib import Path
          import unittest


          ROOT = Path(__file__).resolve().parents[1]


          class QuickActionsUxTest(unittest.TestCase):
              @classmethod
              def setUpClass(cls):
                  cls.js = (ROOT / "static" / "app.js").read_text(encoding="utf-8")
                  cls.css = (ROOT / "static" / "app.css").read_text(encoding="utf-8")

              def test_sheet_has_three_predictable_paths_for_active_reading(self):
                  self.assertIn('onclick="atualizarProgressoRapido()"', self.js)
                  self.assertIn('onclick="adicionarNotaRapida()"', self.js)
                  self.assertIn('onclick="registrarLeituraRapida()"', self.js)
                  block = self.js.split('body.innerHTML=`${seletorLeituraRapidaHTML(lendo)}', 1)[1].split('`;', 1)[0]
                  self.assertEqual(block.count('class="quick-action'), 3)

              def test_multiple_readings_use_one_selector_instead_of_many_rows(self):
                  self.assertIn('id="quickReadingSelect"', self.js)
                  self.assertNotIn('quick-reading-row', self.js)
                  self.assertIn('function indiceLeituraRapida()', self.js)

              def test_note_path_focuses_diary_note(self):
                  self.assertIn("abrirDiarioLeitura(alvo,{foco:'nota'})", self.js)
                  self.assertIn("opcoes.foco==='nota'", self.js)
                  self.assertIn('[data-diary-input="nota"], textarea', self.js)

              def test_empty_shelf_only_offers_registration(self):
                  self.assertIn("if(!lendo.length)", self.js)
                  self.assertIn("quick_register_reading", self.js)

              def test_selector_and_action_layout_are_styled(self):
                  self.assertIn('.quick-reading-picker select', self.css)
                  self.assertIn('.quick-actions-grid', self.css)


          if __name__ == "__main__":
              unittest.main()
          ''').lstrip(), encoding='utf-8')
          PY

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-sync.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Commit validated UX changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add static/app.js static/app.css tests/test_quick_actions_ux.py
          if git diff --cached --quiet; then
            echo 'Quick actions patch already applied.'
            exit 0
          fi
          git commit -m 'ux: simplify central reading actions'
          git push origin HEAD:${{ github.head_ref }}
