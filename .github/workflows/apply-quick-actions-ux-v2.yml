name: Apply quick actions UX v2

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'ux/simplify-quick-actions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Reapply patch with corrected assertion
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/apply-quick-actions-ux.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          script = textwrap.dedent(workflow[start:end])
          exec(compile(script, '<quick-actions-patch>', 'exec'), {})

          test_path = Path('tests/test_quick_actions_ux.py')
          test = test_path.read_text(encoding='utf-8')
          test = test.replace(
              "block.count('class=\"quick-action')",
              "block.count('<button class=\"quick-action')",
          )
          test_path.write_text(test, encoding='utf-8')
          PY

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-sync.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Commit validated UX changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add static/app.js static/app.css tests/test_quick_actions_ux.py
          git commit -m 'ux: simplify central reading actions'
          git push origin HEAD:${{ github.head_ref }}
