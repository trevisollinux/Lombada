name: Dispatch author search fix

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  patch-and-test:
    if: github.event.issue.title == '[automation] apply author search fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: fix/author-search-coverage
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-sync.txt

      - name: Apply patch
        run: python scripts/apply_author_search_fix.py

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-sync.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Commit tested branch changes
        shell: bash
        run: |
          rm -f .github/workflows/apply-author-search-fix.yml
          rm -f .github/author-search-trigger
          rm -f scripts/apply_author_search_fix.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: improve author search coverage"
          git push origin HEAD:fix/author-search-coverage

      - name: Remove temporary dispatcher from main
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main
          git worktree add /tmp/lombada-main origin/main
          cd /tmp/lombada-main
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/dispatch-author-search-fix.yml
          git add -A
          git commit -m "ci: remove completed author search fix dispatcher"
          git push origin main
          gh issue close "${{ github.event.issue.number }}" --comment "Correção aplicada na branch fix/author-search-coverage e testes concluídos."
