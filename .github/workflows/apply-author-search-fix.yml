name: Apply author search fix

on:
  push:
    branches: [fix/author-search-coverage]

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: fix/author-search-coverage

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-sync.txt

      - name: Apply search fixes and regression tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one marker, found {count}")
              return text.replace(old, new, 1)

          main_path = Path("main.py")
          main = main_path.read_text(encoding="utf-8")

          marker = '''def _normalizar_busca(valor: str | None) -> str:
              texto = unicodedata.normalize("NFKD", str(valor or ""))
              texto = "".join(ch for ch in texto if not unicodedata.combining(ch))
              return re.sub(r"\\s+", " ", texto.lower().strip())


          GENEROS_CANONICOS = ['''
          replacement = '''def _normalizar_busca(valor: str | None) -> str:
              texto = unicodedata.normalize("NFKD", str(valor or ""))
              texto = "".join(ch for ch in texto if not unicodedata.combining(ch))
              return re.sub(r"\\s+", " ", texto.lower().strip())


          # SQLite não oferece unaccent e o lower() nativo não remove diacríticos.
          # Este fold portátil mantém o pré-filtro SQL coerente com _normalizar_busca,
          # evitando que "Dostoievski" deixe de buscar "Dostoiévski" no catálogo.
          _SQL_ACCENT_REPLACEMENTS = (
              ("á", "a"), ("à", "a"), ("ã", "a"), ("â", "a"), ("ä", "a"),
              ("Á", "a"), ("À", "a"), ("Ã", "a"), ("Â", "a"), ("Ä", "a"),
              ("é", "e"), ("è", "e"), ("ê", "e"), ("ë", "e"),
              ("É", "e"), ("È", "e"), ("Ê", "e"), ("Ë", "e"),
              ("í", "i"), ("ì", "i"), ("î", "i"), ("ï", "i"),
              ("Í", "i"), ("Ì", "i"), ("Î", "i"), ("Ï", "i"),
              ("ó", "o"), ("ò", "o"), ("õ", "o"), ("ô", "o"), ("ö", "o"),
              ("Ó", "o"), ("Ò", "o"), ("Õ", "o"), ("Ô", "o"), ("Ö", "o"),
              ("ú", "u"), ("ù", "u"), ("û", "u"), ("ü", "u"),
              ("Ú", "u"), ("Ù", "u"), ("Û", "u"), ("Ü", "u"),
              ("ç", "c"), ("Ç", "c"), ("ñ", "n"), ("Ñ", "n"),
              ("ý", "y"), ("ÿ", "y"), ("Ý", "y"),
          )


          def _sql_texto_normalizado(coluna):
              expr = func.coalesce(coluna, "")
              for origem, destino in _SQL_ACCENT_REPLACEMENTS:
                  expr = func.replace(expr, origem, destino)
              return func.lower(expr)


          GENEROS_CANONICOS = ['''
          main = replace_once(main, marker, replacement, "normalização SQL")

          old_filter = '''    elif q_norm:
                  like = f"%{q_norm.lower()}%"
                  filtros.append(
                      func.lower(Obra.titulo).like(like)
                      | func.lower(Obra.autor).like(like)
                      | func.lower(Edicao.editora).like(like)
                      | func.lower(Edicao.tradutor).like(like)
                      | func.lower(Edicao.isbn).like(like)
                  )'''
          new_filter = '''    elif q_norm:
                  like = f"%{q_norm.lower()}%"
                  filtros.append(
                      _sql_texto_normalizado(Obra.titulo).like(like)
                      | _sql_texto_normalizado(Obra.autor).like(like)
                      | _sql_texto_normalizado(Edicao.editora).like(like)
                      | _sql_texto_normalizado(Edicao.tradutor).like(like)
                      | func.lower(func.coalesce(Edicao.isbn, "")).like(like)
                  )'''
          main = replace_once(main, old_filter, new_filter, "pré-filtro do catálogo")

          old_limit = '''    # Busca por texto entrega o topo (mistura com resultados externos depois).
              # Navegação só por filtro é uma vitrine do catálogo — devolve mais itens.
              limite_local = 30 if not busca_textual else 10
              return sorted(docs, key=lambda d: (d.get("_ranking_score") or 0, d.get("edicao_isbn", {}).get("leituras_count") or 0), reverse=True)[:limite_local]'''
          new_limit = '''    # Busca por autor costuma ter dezenas de obras. O limite antigo de 10 cortava
              # o catálogo antes da consolidação com as fontes externas. Para títulos mantemos
              # uma vitrine mais curta; quando o autor domina os matches, entregamos até 30.
              ordenados = sorted(
                  docs,
                  key=lambda d: (d.get("_ranking_score") or 0, d.get("edicao_isbn", {}).get("leituras_count") or 0),
                  reverse=True,
              )
              if not busca_textual:
                  return ordenados[:30]
              autor_hits = sum(1 for d in ordenados if (d.get("_match") or {}).get("autor"))
              titulo_hits = sum(1 for d in ordenados if (d.get("_match") or {}).get("titulo"))
              limite_local = 30 if autor_hits > titulo_hits else 15
              return ordenados[:limite_local]'''
          main = replace_once(main, old_limit, new_limit, "limite local")
          main_path.write_text(main, encoding="utf-8")

          busca_path = Path("busca.py")
          busca = busca_path.read_text(encoding="utf-8")
          busca = replace_once(busca, "_CACHE_SCHEMA_VERSION = 2", "_CACHE_SCHEMA_VERSION = 3", "versão do cache")
          busca_path.write_text(busca, encoding="utf-8")

          fontes_path = Path("fontes.py")
          fontes = fontes_path.read_text(encoding="utf-8")

          old_gbooks = '''def gbooks_buscar(q: str, limite: int = 18) -> list:
              """Busca espinha: volumes do GB colapsados em obras (sem segunda chamada à API)."""
              titulo_q, autor_q = _split_q(q)
              eds = _gbooks_volumes(_gb_query(q))
              if not eds and autor_q:
                  eds = _gbooks_volumes(_gb_query(titulo_q))
              if not eds:
                  return []'''
          new_gbooks = '''def _tokens_consulta_autor(q: str) -> list[str]:
              return [t for t in _match_norm(q).split() if len(t) >= 2]


          def _texto_casa_autor(autor: str, q: str) -> bool:
              tokens = _tokens_consulta_autor(q)
              alvo = _match_norm(autor or "")
              return bool(tokens) and all(t in alvo for t in tokens)


          def _parece_consulta_autor_edicoes(eds: list[dict], q: str) -> bool:
              tokens = _tokens_consulta_autor(q)
              if not tokens:
                  return False
              matches = sum(1 for e in eds if _texto_casa_autor(e.get("_autor", ""), q))
              return matches >= 2 or (matches >= 1 and len(tokens) >= 2)


          def gbooks_buscar(q: str, limite: int = 18) -> list:
              """Busca espinha: volumes do GB colapsados em obras.

              Quando a consulta livre claramente casa com autores, complementa com
              ``inauthor``. Isso evita que o ranking geral do Google devolva só uma
              amostra de obras para nomes como Dostoievski, García Márquez ou Woolf.
              """
              titulo_q, autor_q = _split_q(q)
              eds = _gbooks_volumes(_gb_query(q))
              if not eds and autor_q:
                  eds = _gbooks_volumes(_gb_query(titulo_q))
              if eds and not autor_q and _parece_consulta_autor_edicoes(eds, q):
                  termo_autor = _gb_query(q)
                  extras = _gbooks_volumes(f'inauthor:"{termo_autor}"', maxr=40)
                  vistos = {
                      e.get("ol_edition_key") or "|".join((e.get("titulo_edicao", ""), e.get("_autor", ""), str(e.get("ano") or "")))
                      for e in eds
                  }
                  for e in extras:
                      assinatura = e.get("ol_edition_key") or "|".join((e.get("titulo_edicao", ""), e.get("_autor", ""), str(e.get("ano") or "")))
                      if assinatura not in vistos:
                          vistos.add(assinatura)
                          eds.append(e)
              if not eds:
                  return []'''
          fontes = replace_once(fontes, old_gbooks, new_gbooks, "busca Google Books por autor")

          old_ol_query = '''    def _query(termo):
                  with httpx.Client(timeout=TIMEOUT, headers=_UA) as c:
                      r = c.get(f"{BASE}/search.json",
                                params={"q": termo, "fields": fields, "limit": limite})
                      r.raise_for_status()
                      return r.json().get("docs", [])'''
          new_ol_query = '''    def _query(termo, *, por_autor: bool = False):
                  params = {"fields": fields, "limit": max(limite, 30) if por_autor else limite}
                  params["author" if por_autor else "q"] = termo
                  with httpx.Client(timeout=TIMEOUT, headers=_UA) as c:
                      r = c.get(f"{BASE}/search.json", params=params)
                      r.raise_for_status()
                      return r.json().get("docs", [])'''
          fontes = replace_once(fontes, old_ol_query, new_ol_query, "consulta Open Library")

          old_ol_try = '''    docs = []
              try:
                  docs = _query(q)
                  if not docs and autor_q:
                      docs = _query(titulo_q)
              except Exception:
                  return []

              out = []'''
          new_ol_try = '''    docs = []
              try:
                  docs = _query(q)
                  if not docs and autor_q:
                      docs = _query(titulo_q)
                  if docs and not autor_q:
                      tokens = _tokens_consulta_autor(q)
                      matches = sum(
                          1 for d in docs
                          if tokens and all(t in _match_norm(" ".join(d.get("author_name") or [])) for t in tokens)
                      )
                      if matches >= 2 or (matches >= 1 and len(tokens) >= 2):
                          extras = _query(q, por_autor=True)
                          vistos = {d.get("key") or (d.get("title", ""), tuple(d.get("author_name") or [])) for d in docs}
                          for d in extras:
                              assinatura = d.get("key") or (d.get("title", ""), tuple(d.get("author_name") or []))
                              if assinatura not in vistos:
                                  vistos.add(assinatura)
                                  docs.append(d)
              except Exception:
                  return []

              out = []'''
          fontes = replace_once(fontes, old_ol_try, new_ol_try, "expansão Open Library por autor")
          fontes = replace_once(
              fontes,
              '    pt_idx = [i for i, o in enumerate(out) if o.get("tem_pt")]',
              '    pt_idx = [i for i, o in enumerate(out) if o.get("tem_pt")][:10]',
              "limite de enriquecimento PT",
          )
          fontes_path.write_text(fontes, encoding="utf-8")

          tests_path = Path("tests/test_smoke.py")
          tests = tests_path.read_text(encoding="utf-8")
          test_marker = "\n\nclass NationalityInferenceTest(unittest.TestCase):"
          test_class = r'''


          class AuthorSearchRegressionTest(unittest.TestCase):
              @classmethod
              def setUpClass(cls):
                  with main.Session(main.engine) as s:
                      fixtures = [
                          ("reg-author-dost", "Caderno do Subsolo", "Fiódor Dostoiévski"),
                          ("reg-author-marquez", "Crônica de Macondo", "Gabriel García Márquez"),
                      ]
                      for work_key, titulo, autor in fixtures:
                          obra = s.exec(main.select(main.Obra).where(main.Obra.ol_work_key == work_key)).first()
                          if not obra:
                              obra = main.Obra(ol_work_key=work_key, titulo=titulo, autor=autor)
                              s.add(obra); s.commit(); s.refresh(obra)
                              s.add(main.Edicao(obra_id=obra.id, editora="Editora Regressão", idioma="Português"))
                              s.commit()

                      for i in range(12):
                          work_key = f"reg-author-many-{i}"
                          obra = s.exec(main.select(main.Obra).where(main.Obra.ol_work_key == work_key)).first()
                          if not obra:
                              obra = main.Obra(ol_work_key=work_key, titulo=f"Obra Numerosa {i}", autor="Autór Abundante")
                              s.add(obra); s.commit(); s.refresh(obra)
                              s.add(main.Edicao(obra_id=obra.id, editora="Editora Regressão", idioma="Português"))
                              s.commit()

              def test_autor_sem_acento_encontra_nome_acentuado(self):
                  with main.Session(main.engine) as s:
                      docs = main._buscar_catalogo_local("Dostoievski", s)
                  self.assertTrue(any(d["titulo"] == "Caderno do Subsolo" for d in docs))

              def test_outro_autor_sem_acentos_tambem_funciona(self):
                  with main.Session(main.engine) as s:
                      docs = main._buscar_catalogo_local("Garcia Marquez", s)
                  self.assertTrue(any(d["titulo"] == "Crônica de Macondo" for d in docs))

              def test_busca_dominada_por_autor_nao_corta_em_dez_obras(self):
                  with main.Session(main.engine) as s:
                      docs = main._buscar_catalogo_local("Autor Abundante", s)
                  do_autor = [d for d in docs if main._normalizar_busca(d.get("autor")) == "autor abundante"]
                  self.assertGreaterEqual(len(do_autor), 12)
          '''
          test_class = "\n".join(line[10:] if line.startswith("          ") else line for line in test_class.splitlines())
          if test_marker not in tests:
              raise SystemExit("test marker not found")
          tests = tests.replace(test_marker, test_class + test_marker, 1)
          tests_path.write_text(tests, encoding="utf-8")
          PY

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-sync.txt

      - name: Run test suite
        run: python -m unittest discover -s tests -v

      - name: Commit tested fix
        shell: bash
        run: |
          rm -f .github/workflows/apply-author-search-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main.py busca.py fontes.py tests/test_smoke.py .github/workflows/apply-author-search-fix.yml
          git commit -m "fix: improve author search coverage"
          git push origin HEAD:fix/author-search-coverage
