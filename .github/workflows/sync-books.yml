name: Sync book source records

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

jobs:
  sync-books:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SYNC_TERMS: Comporte-se,Determinados,Dom Casmurro
      MELI_CATEGORY_IDS: MLB1196
      MELI_LIMIT: "10"
      MELI_PAGES: "1"
      SYNC_SLEEP_SECONDS: "0.5"
      DRY_RUN: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sync dependencies
        run: python -m pip install -r requirements-sync.txt

      - name: Run Mercado Livre sync
        run: python scripts/sync_mercado_livre.py
