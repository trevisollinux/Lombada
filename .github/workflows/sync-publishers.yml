name: Sync publisher source records

# Raspa catálogos de editoras -> source_records e (quando não é dry-run) promove
# para o catálogo que a busca do app lê. A ingestão é INCREMENTAL: cada execução
# pula os livros já gravados e avança pelos próximos, então rodando aos poucos
# (via cron) a base cresce sozinha, sem ser agressivo.
#
# Dispare pela aba Actions (funciona do celular):
#   dry_run=true  -> só coleta e mostra amostra/cobertura (não grava, não promove)
#   dry_run=false -> grava o lote novo em source_records e promove pro catálogo

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true = só testa e mostra amostra; false = grava + promove'
        type: choice
        options: ['true', 'false']
        default: 'true'
      diagnose:
        description: 'true = só mostra status/plataforma de cada editora (não coleta)'
        type: choice
        options: ['false', 'true']
        default: 'false'
      max_urls:
        description: 'tamanho do lote: nº de livros por editora nesta execução'
        required: false
        default: '100'
      offset:
        description: 'faixa: começar do livro nº (ex.: 0, depois 100, 200...). Vazio = incremental automático'
        required: false
        default: ''
      slugs:
        description: 'filtrar editoras por slug, separadas por vírgula (vazio = todas)'
        required: false
        default: ''
      sleep_seconds:
        description: 'pausa entre páginas (segundos) — maior = mais gentil'
        required: false
        default: '1.0'
      dump_url:
        description: 'depura UMA url de livro (mostra JSON-LD/meta/texto) e sai'
        required: false
        default: ''
  schedule:
    # A cada 3 horas, no minuto 13, em lotes moderados, evitando o pico do minuto zero do GitHub Actions.
    # (O GitHub pode atrasar o horário agendado em minutos sob carga — é normal.)
    - cron: "13 */3 * * *"

permissions:
  contents: read

# Garante um run POR WORKFLOW por vez: se um ainda está rodando, o próximo espera
# (não atropela nem duplica trabalho). O limite é deste grupo, não do GitHub —
# sync-publishers-expansao.yml, sync-publishers-universitarias.yml,
# sync-publishers-cia.yml e sync-publishers-editora34.yml têm grupos próprios e
# rodam em PARALELO a este (cada um cobre um PUBLISHER_GROUP distinto; o promote é
# serializado entre eles por advisory lock no Postgres).
concurrency:
  group: sync-publishers
  cancel-in-progress: false

jobs:
  sync-publishers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-sync.txt

      - name: Install dependencies
        run: pip install -r requirements-sync.txt

      # Sem passo de Playwright: as fontes deste grupo usam platform=auto/id_range
      # (shopify/vtex/sitemap/html via requests). O Chromium só era necessário pro
      # debug de paginação da Cia das Letras, que agora vive no sync-publishers-cia.yml.

      - name: Sync publisher source records
        run: |
          # pipefail + status: sem isto, o `| tee` engolia o código de saída e o job
          # ficava VERDE mesmo quando o script morria no meio (ex.: SSL caído).
          set -o pipefail
          status=0
          python scripts/init_ingestion_tables.py
          python scripts/sync_publishers.py | tee sync_resultado.txt || status=$?
          {
            echo '### Sync de editoras -> source_records'
            echo ''
            echo '```'
            cat sync_resultado.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PUBLISHER_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          PUBLISHER_DIAGNOSE: ${{ inputs.diagnose || 'false' }}
          PUBLISHER_DUMP_URL: ${{ inputs.dump_url || '' }}
          PUBLISHER_MAX_URLS: ${{ inputs.max_urls || '250' }}
          PUBLISHER_OFFSET: ${{ inputs.offset || '' }}
          PUBLISHER_SLUGS: ${{ inputs.slugs || '' }}
          # Este workflow cobre só as fontes do grupo "principal"; as demais
          # ficam com os workflows paralelos (expansao/universitarias/cia/editora34).
          # PUBLISHER_SLUGS explícito vence o grupo (dá pra testar qualquer uma).
          PUBLISHER_GROUP: 'principal'
          PUBLISHER_SLEEP_SECONDS: ${{ inputs.sleep_seconds || '1.0' }}

      - name: Promote new records to catalog
        # Só promove em ingestão real (não em dry-run nem diagnose/dump). `always()`
        # garante que promovemos o que JÁ foi coletado mesmo se uma editora falhou e
        # o passo anterior saiu vermelho — o trabalho salvo não fica esperando.
        if: ${{ always() && (inputs.dry_run || 'false') != 'true' && (inputs.diagnose || 'false') != 'true' && (inputs.dump_url || '') == '' }}
        run: |
          set -o pipefail
          status=0
          python scripts/init_ingestion_tables.py
          python scripts/promote_source_records.py | tee promote_resultado.txt || status=$?
          {
            echo '### Promoção source_records -> catálogo'
            echo ''
            echo '```'
            cat promote_resultado.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DRY_RUN: 'false'
          PROMOTE_MIN_CONFIDENCE: '0.5'
          PROMOTE_LIMIT: '5000'
