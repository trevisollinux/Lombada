name: Scrape editoras

# Coleta metadados dos catálogos das editoras (Shopify/VTEX/sitemap+JSON-LD)
# para construir a base própria. Dispare pela aba Actions (funciona do celular).
#   modo=probe  -> só testa e mostra amostra no Summary (não grava nada)
#   modo=full   -> grava data/catalog_scraped.json e commita no repo

on:
  workflow_dispatch:
    inputs:
      modo:
        description: 'probe (testa/mostra) ou full (grava e commita o catálogo)'
        type: choice
        options: [probe, full]
        default: probe
      editora:
        description: 'filtrar por nome (vazio = todas)'
        required: false
        default: ''
      limite:
        description: 'máx. de livros por editora'
        required: false
        default: '8'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rodar scraper
        env:
          MODO: ${{ inputs.modo }}
          EDITORA: ${{ inputs.editora }}
          LIMITE: ${{ inputs.limite }}
        run: |
          python3 scripts/scrape_editoras.py "$MODO" | tee scrape_resultado.txt
          {
            echo '### Resultado do scrape de editoras'
            echo ''
            echo '```'
            cat scrape_resultado.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commitar catálogo (modo full)
        if: ${{ inputs.modo == 'full' }}
        run: |
          if [ -n "$(git status --porcelain data/catalog_scraped.json)" ]; then
            git config user.name "lombada-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/catalog_scraped.json
            git commit -m "data: atualiza catalog_scraped.json via scrape de editoras"
            git push
          else
            echo "Sem mudancas no catalogo."
          fi

      - name: Artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-resultado
          path: scrape_resultado.txt
