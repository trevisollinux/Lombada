name: Apply home UX hierarchy

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'ux/home-reading-priority'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply focused home UX changes
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import textwrap

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          new_home = '''      <div id="homeFeed" class="home-feed">
                <div class="hero-extra home-intro">
                  <div class="label" data-i18n="home_label">um diário de leituras</div>
                  <h1 class="h-display" data-i18n="home_title_html">o que você<br>está lendo<span class="q">?</span></h1>
                </div>

                <section id="lendoAgora" class="home-primary" aria-live="polite"></section>
                <section id="onboardingBox" class="home-onboarding" aria-live="polite"></section>

                <section class="home-discovery" aria-labelledby="homePopularLabel">
                  <div class="section-head popular-section-head">
                    <div class="label" id="homePopularLabel" data-i18n="popular_works_label">explore · obras populares</div>
                    <div class="view-toggle" id="homePopularViewToggle" aria-label="visualização de obras populares"></div>
                  </div>
                  <div class="wall wall-mini" id="populares"></div>
                </section>

                <section id="editorasHome" class="home-publishers" aria-live="polite"></section>
              </div>'''
          if 'id="homeFeed" class="home-feed"' not in html:
              start = html.index('      <div id="homeFeed">')
              end = html.index('\n\n    <!-- TELA: resultados de busca -->', start)
              html = html[:start] + new_home + html[end:]
          index.write_text(html, encoding='utf-8')

          app = Path('static/app.js')
          js = app.read_text(encoding='utf-8')

          old_popular = "const lista=(obras&&obras.length?obras:SUGESTOES).map(normalizarObraPopular);"
          new_popular = "const lista=(obras&&obras.length?obras:SUGESTOES).map(normalizarObraPopular).slice(0,8);"
          if new_popular not in js:
              if old_popular not in js:
                  raise SystemExit('lista de obras populares não encontrada')
              js = js.replace(old_popular, new_popular, 1)

          new_reading = '''function renderLendoAgora(){
            const lendo = prateleira.filter(l=>l.status==='Lendo');
            const box=$('#lendoAgora');
            const home=$('#homeFeed');
            home?.classList.toggle('has-current-reading',lendo.length>0);
            if(!lendo.length){ box.innerHTML=''; return; }
            const l=lendo[0], idx=prateleira.indexOf(l);
            box.innerHTML=`<div class="section-head"><h2 class="h-section">${leituraNoFim(l)?t('reading_finished_label'):t('continue_reading')}</h2><button type="button" class="more home-more-button" onclick="irPara('estante')">${t('see_shelf')}</button></div>${lendoAgoraCard(l,idx,false,false)}`;
          }'''
          if "classList.toggle('has-current-reading'" not in js:
              pattern = r"function renderLendoAgora\(\)\{.*?\n\}\n(?=\n/\* onboarding:)"
              js, count = re.subn(pattern, new_reading + '\n', js, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit('renderLendoAgora não encontrado')

          new_onboarding = '''function renderOnboarding(){
            const box=$('#onboardingBox');
            if(!box) return;
            const home=$('#homeFeed');
            const est=estadoOnboarding();
            if(est.concluido){
              box.innerHTML='';
              home?.classList.remove('has-onboarding');
              return;
            }
            home?.classList.add('has-onboarding');
            const registrou=prateleira.length>0;
            const atualizouProgresso=diarioEntradas.length>0;
            const conheceuPerfil=!!est.perfilVisitado;
            if(registrou&&atualizouProgresso&&conheceuPerfil){
              salvarEstadoOnboarding({concluido:true});
              box.innerHTML='';
              home?.classList.remove('has-onboarding');
              return;
            }
            box.innerHTML=registrou?onboardingChecklistHTML({registrou,atualizouProgresso,conheceuPerfil}):onboardingHeroHTML();
          }'''
          if "home?.classList.add('has-onboarding')" not in js:
              pattern = r"function renderOnboarding\(\)\{.*?\n\}\n(?=\n+function handleLinkHTML)"
              js, count = re.subn(pattern, new_onboarding + '\n', js, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit('renderOnboarding não encontrado')

          app.write_text(js, encoding='utf-8')

          css = Path('static/app.css')
          styles = css.read_text(encoding='utf-8')
          marker = '/* Home hierarchy: prioritize the current reading and progressive discovery. */'
          if marker not in styles:
              styles += textwrap.dedent('''

              /* Home hierarchy: prioritize the current reading and progressive discovery. */
              .home-feed{display:flex;flex-direction:column;gap:28px}
              .home-feed .hero-extra{margin-bottom:0}
              .home-primary:empty,.home-onboarding:empty,.home-publishers:empty{display:none}
              .home-primary{order:1}
              .home-onboarding{order:2}
              .home-discovery{order:3;padding-top:8px}
              .home-publishers{order:4;padding-top:4px;border-top:1px solid var(--rule)}
              .home-feed.has-current-reading .home-intro{display:none}
              .home-feed.has-current-reading .home-primary{margin-top:2px}
              .home-feed.has-current-reading .home-onboarding .onboarding-checklist-wrap{margin-top:0}
              .home-more-button{
                appearance:none;border:0;background:transparent;padding:8px 0 8px 12px;
                font:inherit;cursor:pointer;text-decoration:underline;text-underline-offset:3px;
              }
              .home-discovery .popular-section-head{margin-top:0}
              .home-discovery #populares{margin-bottom:0}
              .home-publishers .publisher-strip{margin-top:0}

              @media(max-width:640px){
                .home-feed{gap:22px}
                .home-discovery{padding-top:2px}
                .home-publishers{padding-top:18px}
                .home-feed:not(.has-current-reading) .home-intro{margin-bottom:-4px}
              }
              ''')
          css.write_text(styles, encoding='utf-8')

          test_content = textwrap.dedent('''
          """Regression tests for the home information hierarchy."""
          from pathlib import Path
          import unittest


          ROOT = Path(__file__).resolve().parents[1]


          class HomeHierarchyTest(unittest.TestCase):
              @classmethod
              def setUpClass(cls):
                  cls.html = (ROOT / "index.html").read_text(encoding="utf-8")
                  cls.js = (ROOT / "static" / "app.js").read_text(encoding="utf-8")
                  cls.css = (ROOT / "static" / "app.css").read_text(encoding="utf-8")

              def test_current_reading_precedes_onboarding_and_discovery(self):
                  reading = self.html.index('id="lendoAgora"')
                  onboarding = self.html.index('id="onboardingBox"')
                  popular = self.html.index('id="populares"')
                  publishers = self.html.index('id="editorasHome"')

                  self.assertLess(reading, onboarding)
                  self.assertLess(onboarding, popular)
                  self.assertLess(popular, publishers)

              def test_returning_reader_hides_redundant_hero(self):
                  self.assertIn("classList.toggle('has-current-reading'", self.js)
                  self.assertIn(
                      ".home-feed.has-current-reading .home-intro{display:none}",
                      self.css,
                  )

              def test_see_shelf_is_a_real_button(self):
                  self.assertIn('class="more home-more-button"', self.js)
                  self.assertIn('<button type="button"', self.js)

              def test_home_discovery_is_intentionally_bounded(self):
                  self.assertIn(".map(normalizarObraPopular).slice(0,8)", self.js)


          if __name__ == "__main__":
              unittest.main()
          ''').lstrip()
          Path('tests/test_home_ux.py').write_text(test_content, encoding='utf-8')
          PY

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-sync.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Commit validated UX changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html static/app.js static/app.css tests/test_home_ux.py
          if git diff --cached --quiet; then
            echo 'UX patch already applied.'
            exit 0
          fi
          git commit -m 'ux: prioritize current reading on home'
          git push origin HEAD:${{ github.head_ref }}
