name: Apply bounded parallel fetch patch v2

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-and-smoke:
    if: github.head_ref == 'perf/bounded-parallel-page-fetch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply patch from validated recipe
        run: |
          deleted_commit=$(git log -n 1 --format=%H -- .github/workflows/apply-bounded-parallel-fetch.yml)
          git show "${deleted_commit}^:.github/workflows/apply-bounded-parallel-fetch.yml" > /tmp/patch-workflow.yml
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('/tmp/patch-workflow.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          script = textwrap.dedent(workflow[start:end])
          exec(compile(script, '<bounded-fetch-patch>', 'exec'), {})
          PY

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-sync.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Live smoke with five Todavia books
        env:
          PUBLISHER_DRY_RUN: 'true'
          PUBLISHER_MAX_URLS: '5'
          PUBLISHER_SLUGS: 'todavia'
          PUBLISHER_SLEEP_SECONDS: '0.2'
          PUBLISHER_FETCH_CONCURRENCY: '4'
        run: |
          set -o pipefail
          python scripts/sync_publishers.py | tee scraper-smoke.txt
          grep -Eq 'DRY_RUN: [1-9][0-9]* registros novos coletados' scraper-smoke.txt
          {
            echo '### Scraper smoke — Todavia, 5 livros'
            echo '```'
            cat scraper-smoke.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit validated patch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/sync_publishers.py tests/test_sync_publishers_concurrency.py
          if git diff --cached --quiet; then
            echo 'Patch já aplicado; nada para commitar.'
            exit 0
          fi
          git commit -m 'perf: hydrate book pages with bounded concurrency'
          git push origin HEAD:${{ github.head_ref }}
