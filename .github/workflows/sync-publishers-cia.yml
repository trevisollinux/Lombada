name: Sync publishers (Companhia das Letras)

# Mesmo pipeline do sync-publishers.yml, mas cobrindo SÓ a Companhia das Letras
# (group "cia" do SOURCES). Foi separada do grupo principal porque a coleta dela
# (collect_via_categoria_json) varre ~218 categorias × ~16 páginas com pausa
# entre elas a cada execução — leva bem mais tempo que as demais editoras do
# principal (Shopify/sitemap/id_range, que pulam o já-visto de graça). Isolando-a
# num workflow próprio, o principal termina rápido sem esperar por ela.
#
# Cron a cada 3 HORAS: como a Cia demora e a ingestão é incremental, não há
# ganho em rodá-la de hora em hora. Roda em PARALELO aos outros syncs
# (concurrency group próprio); o
# promote é serializado entre workflows por advisory lock no Postgres.
#
# Dispare pela aba Actions (funciona do celular):
#   dry_run=true  -> só coleta e mostra amostra/cobertura (não grava, não promove)
#   dry_run=false -> grava o lote novo em source_records e promove pro catálogo

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true = só testa e mostra amostra; false = grava + promove'
        type: choice
        options: ['true', 'false']
        default: 'true'
      diagnose:
        description: 'true = só mostra status/plataforma de cada editora (não coleta)'
        type: choice
        options: ['false', 'true']
        default: 'false'
      max_urls:
        description: 'tamanho do lote: nº de livros por editora nesta execução'
        required: false
        default: '100'
      offset:
        description: 'faixa: começar do livro nº (ex.: 0, depois 100, 200...). Vazio = incremental automático'
        required: false
        default: ''
      slugs:
        description: 'filtrar editoras por slug, separadas por vírgula (vazio = todas do grupo cia)'
        required: false
        default: ''
      sleep_seconds:
        description: 'pausa entre páginas (segundos) — maior = mais gentil'
        required: false
        default: '1.0'
      dump_url:
        description: 'depura UMA url de livro (mostra JSON-LD/meta/texto) e sai'
        required: false
        default: ''
      debug_categoria_paginacao:
        description: 'true = investiga se rolar/paginar 1 página de categoria (Cia das Letras) traz mais livros, e sai'
        type: choice
        options: ['false', 'true']
        default: 'false'
  schedule:
    # A cada 3 horas, no minuto 51 (defasado dos outros syncs: :13 principal,
    # :29 expansão, :43 universitárias) só pra espalhar a carga no Neon.
    - cron: "51 */3 * * *"

concurrency:
  group: sync-publishers-cia
  cancel-in-progress: false

jobs:
  sync-publishers-cia:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-sync.txt

      - name: Install Playwright browser (Chromium)
        # A coleta real da Cia das Letras não usa mais Playwright (foi trocada
        # por collect_via_categoria_json, que fala direto com a API JSON via
        # requests). Isto fica só pra debug_categoria_paginacao=true, que
        # inspeciona chamadas xhr/fetch com o Chromium headless.
        run: playwright install --with-deps chromium

      - name: Sync publisher source records (grupo cia)
        run: |
          # pipefail + status: sem isto, o `| tee` engolia o código de saída e o job
          # ficava VERDE mesmo quando o script morria no meio (ex.: SSL caído).
          set -o pipefail
          status=0
          python scripts/init_ingestion_tables.py
          python scripts/sync_publishers.py | tee sync_resultado.txt || status=$?
          {
            echo '### Sync Companhia das Letras -> source_records'
            echo ''
            echo '```'
            cat sync_resultado.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PUBLISHER_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          PUBLISHER_DIAGNOSE: ${{ inputs.diagnose || 'false' }}
          PUBLISHER_DUMP_URL: ${{ inputs.dump_url || '' }}
          PUBLISHER_DEBUG_CATEGORIA_PAGINACAO: ${{ inputs.debug_categoria_paginacao || 'false' }}
          PUBLISHER_MAX_URLS: ${{ inputs.max_urls || '250' }}
          PUBLISHER_OFFSET: ${{ inputs.offset || '' }}
          PUBLISHER_SLUGS: ${{ inputs.slugs || '' }}
          PUBLISHER_GROUP: 'cia'
          PUBLISHER_SLEEP_SECONDS: ${{ inputs.sleep_seconds || '1.0' }}

      - name: Promote new records to catalog
        # Só promove em ingestão real (não em dry-run nem diagnose/dump). `always()`
        # garante que promovemos o que JÁ foi coletado mesmo se uma editora falhou e
        # o passo anterior saiu vermelho — o trabalho salvo não fica esperando.
        if: ${{ always() && (inputs.dry_run || 'false') != 'true' && (inputs.diagnose || 'false') != 'true' && (inputs.dump_url || '') == '' && (inputs.debug_categoria_paginacao || 'false') != 'true' }}
        run: |
          set -o pipefail
          status=0
          python scripts/init_ingestion_tables.py
          python scripts/promote_source_records.py | tee promote_resultado.txt || status=$?
          {
            echo '### Promoção source_records -> catálogo'
            echo ''
            echo '```'
            cat promote_resultado.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DRY_RUN: 'false'
          PROMOTE_MIN_CONFIDENCE: '0.5'
          PROMOTE_LIMIT: '5000'
