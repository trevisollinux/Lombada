# O startCommand aqui tem precedência sobre o valor preso na configuração do
# serviço (que um script de recovery antigo gravou como
# "uvicorn ... --port $PORT" e que o Railway passa como argv, sem shell — o
# "$PORT" chegava literal e derrubava o container). "python start.py" não tem
# variável de shell para expandir: o entrypoint lê PORT do ambiente no Python.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python start.py"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
