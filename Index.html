<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lombada</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Spectral:ital,wght@0,400;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:#16131D; --ink2:#211C2B; --bone:#ECE4D4; --dim:#B7AE9C;
    --gold:#C9A24B; --line:#34303f; --mono:'Space Mono',monospace;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; background:#0E0C13; color:var(--bone);
    font-family:Spectral,serif; line-height:1.5;
  }
  header { padding:28px 20px 8px; max-width:760px; margin:0 auto; }
  .wm { font-family:var(--mono); font-weight:700; color:var(--gold);
        letter-spacing:2px; font-size:13px; }
  h1 { font-family:Fraunces,serif; font-weight:600; font-size:34px; margin:6px 0 2px; }
  .sub { color:var(--dim); font-size:14px; margin:0 0 18px; }
  main { max-width:760px; margin:0 auto; padding:0 20px 80px; }
  .search { display:flex; gap:8px; margin-bottom:24px; }
  input[type=text] {
    flex:1; background:var(--ink); border:1px solid var(--line); border-radius:10px;
    color:var(--bone); padding:13px 14px; font-size:15px; font-family:Spectral,serif; outline:none;
  }
  button {
    background:var(--gold); color:#1a1409; border:none; border-radius:10px;
    padding:0 20px; font-family:var(--mono); font-weight:700; font-size:13px; cursor:pointer;
  }
  button.ghost { background:transparent; color:var(--gold); border:1px solid var(--gold); padding:8px 14px; }
  .eyebrow { font-family:var(--mono); font-size:11px; letter-spacing:1.5px;
             text-transform:uppercase; color:var(--dim); margin:26px 0 10px; }
  .card { background:var(--ink2); border:1px solid var(--line); border-radius:14px;
          padding:14px; margin-bottom:10px; display:flex; gap:14px; align-items:flex-start; }
  .capa { width:54px; height:80px; object-fit:cover; border-radius:5px; background:#2c2636; flex:none; }
  .t { font-family:Fraunces,serif; font-weight:600; font-size:18px; }
  .a { color:var(--dim); font-size:14px; }
  .meta { font-family:var(--mono); font-size:12px; color:var(--dim); margin-top:4px; }
  .trad { color:var(--gold); }
  .row { display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .grow { flex:1; }
  .stars { font-size:24px; letter-spacing:3px; cursor:pointer; user-select:none; color:var(--gold); }
  .star { opacity:.28; } .star.on { opacity:1; }
  textarea { width:100%; background:var(--ink); border:1px solid var(--line); border-radius:10px;
             color:var(--bone); padding:10px; font-family:Spectral,serif; font-size:14px; resize:vertical; }
  select { background:var(--ink); color:var(--bone); border:1px solid var(--line);
           border-radius:8px; padding:9px; font-family:var(--mono); font-size:12px; }
  .hint { color:var(--dim); font-size:12px; }
  .empty { color:var(--dim); font-style:italic; padding:20px 0; }
  a.link { color:var(--gold); cursor:pointer; text-decoration:underline; }
</style>
</head>
<body>
<header>
  <div class="wm">LOMBADA</div>
  <h1>o que você está lendo?</h1>
  <p class="sub">busca a obra · escolhe a edição (e o tradutor) · registra com nota e relato</p>
</header>
<main>
  <div class="search">
    <input id="q" type="text" placeholder="ex: crime e castigo" />
    <button onclick="buscar()">buscar</button>
  </div>

  <div id="resultados"></div>
  <div id="edicoes"></div>
  <div id="form"></div>

  <div class="eyebrow">minha prateleira</div>
  <div id="prateleira"><div class="empty">vazia ainda.</div></div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let escolha = null;        // obra escolhida
let edicaoSel = null;      // edição escolhida
let notaSel = 0;

async function buscar() {
  const q = $('q').value.trim();
  if (q.length < 2) return;
  $('resultados').innerHTML = '<div class="empty">buscando…</div>';
  $('edicoes').innerHTML = ''; $('form').innerHTML = '';
  const r = await fetch('/api/buscar?q=' + encodeURIComponent(q));
  const docs = await r.json();
  if (!docs.length) { $('resultados').innerHTML = '<div class="empty">nada encontrado.</div>'; return; }
  $('resultados').innerHTML = '<div class="eyebrow">resultados</div>' + docs.map((d,i) => `
    <div class="card">
      ${d.capa_url ? `<img class="capa" src="${d.capa_url}">` : '<div class="capa"></div>'}
      <div class="grow">
        <div class="t">${esc(d.titulo)}</div>
        <div class="a">${esc(d.autor)} ${d.ano ? '· ' + d.ano : ''}</div>
        <div style="margin-top:8px"><button class="ghost" onclick='verEdicoes(${i})'>ver edições</button></div>
      </div>
    </div>`).join('');
  window._docs = docs;
}

async function verEdicoes(i) {
  escolha = window._docs[i];
  $('edicoes').innerHTML = '<div class="eyebrow">edições · ' + esc(escolha.titulo) + '</div><div class="empty">carregando…</div>';
  $('form').innerHTML = '';
  const r = await fetch('/api/edicoes?work_key=' + encodeURIComponent(escolha.work_key));
  const eds = await r.json();
  if (!eds.length) { $('edicoes').innerHTML += '<div class="empty">sem edições listadas.</div>'; return; }
  $('edicoes').innerHTML = '<div class="eyebrow">edições · ' + esc(escolha.titulo) + '</div>' + eds.map((e,j) => `
    <div class="card">
      ${e.capa_url ? `<img class="capa" src="${e.capa_url}">` : '<div class="capa"></div>'}
      <div class="grow">
        <div class="t" style="font-size:16px">${esc(e.editora || 'editora não informada')}</div>
        <div class="meta">${e.tradutor ? '<span class="trad">trad. ' + esc(e.tradutor) + '</span>' : '<span style="opacity:.6">tradutor não informado</span>'} ${e.ano ? '· ' + e.ano : ''} ${e.idioma ? '· ' + esc(e.idioma) : ''}</div>
        <div class="meta">${e.isbn || ''}</div>
        <div style="margin-top:8px"><button class="ghost" onclick='escolherEdicao(${j})'>escolher esta</button></div>
      </div>
    </div>`).join('');
  window._eds = eds;
}

function escolherEdicao(j) {
  edicaoSel = window._eds[j]; notaSel = 0;
  $('form').innerHTML = `
    <div class="eyebrow">registrar leitura</div>
    <div class="card" style="flex-direction:column">
      <div class="row" style="width:100%">
        <div class="grow">
          <div class="t" style="font-size:16px">${esc(escolha.titulo)}</div>
          <div class="meta">${esc(edicaoSel.editora)} ${edicaoSel.tradutor ? '· trad. ' + esc(edicaoSel.tradutor) : ''}</div>
        </div>
        <select id="status">
          <option>Lido</option><option>Lendo</option><option>Quero ler</option>
        </select>
      </div>
      <div class="stars" id="stars" style="margin:12px 0 4px"></div>
      <textarea id="relato" rows="3" placeholder="breve relato… (vira a legenda do card)"></textarea>
      <div class="row" style="width:100%; margin-top:10px">
        <span class="hint">o card de estrelas pra postar vem do componente Lombada (próximo passo)</span>
        <button onclick="salvar()">salvar na prateleira</button>
      </div>
    </div>`;
  renderStars();
}

function renderStars() {
  const wrap = $('stars'); wrap.innerHTML = '';
  for (let n = 1; n <= 5; n++) {
    const s = document.createElement('span');
    s.textContent = '★'; s.className = 'star' + (n <= notaSel ? ' on' : '');
    s.onclick = () => { notaSel = (notaSel === n) ? n - 0.5 : n; renderStars(); };
    wrap.appendChild(s);
  }
  const lab = document.createElement('span');
  lab.style.cssText = 'font-family:var(--mono);font-size:14px;color:var(--dim);margin-left:10px';
  lab.textContent = notaSel ? notaSel.toLocaleString('pt-BR') : '—';
  wrap.appendChild(lab);
}

async function salvar() {
  const body = {
    work_key: escolha.work_key, titulo: escolha.titulo, autor: escolha.autor,
    idioma_original: escolha.idioma_original, ano_obra: escolha.ano,
    ol_edition_key: edicaoSel.ol_edition_key, editora: edicaoSel.editora,
    tradutor: edicaoSel.tradutor, isbn: edicaoSel.isbn, idioma: edicaoSel.idioma,
    ano_edicao: edicaoSel.ano, capa_url: edicaoSel.capa_url,
    status: $('status').value, nota: notaSel || null, relato: $('relato').value, data: ''
  };
  await fetch('/api/prateleira', {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
  });
  $('resultados').innerHTML=''; $('edicoes').innerHTML=''; $('form').innerHTML=''; $('q').value='';
  carregarPrateleira();
}

async function carregarPrateleira() {
  const r = await fetch('/api/prateleira');
  const ls = await r.json();
  if (!ls.length) { $('prateleira').innerHTML = '<div class="empty">vazia ainda.</div>'; return; }
  $('prateleira').innerHTML = ls.map(l => `
    <div class="card">
      ${l.capa_url ? `<img class="capa" src="${l.capa_url}">` : '<div class="capa"></div>'}
      <div class="grow">
        <div class="row"><div class="t" style="font-size:17px">${esc(l.titulo)}</div>
          <div class="stars" style="font-size:16px">${estrelas(l.nota)}</div></div>
        <div class="a">${esc(l.autor)}</div>
        <div class="meta">${esc(l.editora)} ${l.tradutor ? '· <span class="trad">trad. ' + esc(l.tradutor) + '</span>' : ''} · ${esc(l.status)}</div>
        ${l.relato ? '<div style="margin-top:6px;font-style:italic">“' + esc(l.relato) + '”</div>' : ''}
      </div>
    </div>`).join('');
}

function estrelas(n) {
  n = n || 0; let out = '';
  for (let i = 1; i <= 5; i++) out += `<span class="star ${i <= n ? 'on':''}">★</span>`;
  return out;
}
function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

carregarPrateleira();
</script>
</body>
</html>
